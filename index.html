function buildWeekView(){
  var o='';
  var now=new Date();
  var weekDKs=[];
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(now.getDate()-i);
    weekDKs.push({dk:dateKey(d),date:new Date(d),dow:d.getDay(),dn:d.getDate()});
  }
  var ps=periodStats(weekDKs.map(function(x){return x.dk}),D.statFilterSeg);
  var avgDayPct=ps.dayPcts.length?ps.dayPcts.reduce(function(a,b){return a+b},0)/ps.dayPcts.length:0;
  var activeDays=ps.dayPcts.filter(function(p){return p>=.5}).length;

  o+='<div class="wk-list">';
  weekDKs.forEach(function(d){
    var ds=D.statFilterSeg?segDayStats(D.statFilterSeg,d.dk):dayStats(d.dk);
    var pct=Math.round(ds.pct*100);
    var isToday=d.dk===dateKey();
    var hasNote=D.notes[d.dk];
    var barColor=pct===0?"var(--line2)":pct>=100?"var(--matcha)":pct>=70?"var(--matcha-warm)":pct>=40?"var(--gold)":"var(--rose-warm)";
    o+='<div class="wk-row'+(isToday?" today":"")+'" onclick="openDayDetail(\''+d.dk+'\')">';
    o+='<div class="wk-d"><div class="wk-dow">'+DOW_TH[d.dow]+'</div><div class="wk-dn">'+d.dn+'</div></div>';
    o+='<div class="wk-bar"><div class="wk-bar-f" style="width:'+pct+'%;background:'+barColor+'"></div></div>';
    if(hasNote)o+='<span class="wk-nt-ic" title="มีโน้ต">✎</span>';
    o+='<div class="wk-pct">'+pct+'%</div>';
    o+='</div>';
  });
  o+='</div>';

  // Compact summary below week list
  o+='<div class="st-summary">';
  o+='<div class="st-sum-row">';
  o+='<div class="st-sum-cell"><div class="st-sum-v">'+Math.round(avgDayPct*100)+'<span class="st-sum-u">%</span></div><div class="st-sum-l">เฉลี่ย/วัน</div></div>';
  o+='<div class="st-sum-cell"><div class="st-sum-v">'+activeDays+'<span class="st-sum-u">/7</span></div><div class="st-sum-l">วัน active</div></div>';
  o+='<div class="st-sum-cell"><div class="st-sum-v">'+ps.done+'</div><div class="st-sum-l">ทำทั้งหมด</div></div>';
  o+='<div class="st-sum-cell"><div class="st-sum-v">'+(ps.possible-ps.done)+'</div><div class="st-sum-l">พลาด</div></div>';
  o+='</div>';
  o+='</div>';

  if(D.statSelDate)o+=buildDayDetail(D.statSelDate);
  return o;
}

function buildMonthView(){
  var o='';
  var now=new Date();
  var viewY=now.getFullYear(),viewM=now.getMonth()+D.statMonthOff;
  while(viewM<0){viewM+=12;viewY--}
  while(viewM>11){viewM-=12;viewY++}
  var daysInMonth=new Date(viewY,viewM+1,0).getDate();
  var monthDKs=[];
  for(var d=1;d<=daysInMonth;d++)monthDKs.push(dateKeyOf(viewY,viewM,d));
  var ps=periodStats(monthDKs,D.statFilterSeg);
  var avgDayPct=ps.dayPcts.length?ps.dayPcts.reduce(function(a,b){return a+b},0)/ps.dayPcts.length:0;
  var st=streaks(0.5);
  var activeDays=ps.dayPcts.filter(function(p){return p>=.5}).length;

  // ═══ CALENDAR FIRST ═══
  o+='<div class="cal-wrap">';
  o+='<div class="cal-nav">';
  o+='<button class="cal-nav-btn" onclick="navMonth(-1)" aria-label="เดือนก่อน">‹</button>';
  o+='<div class="cal-title">'+MONTH_TH[viewM]+' '+viewY+(D.hj&&D.statMonthOff===0?'<div class="ct-hj">'+esc(D.hj.month.ar)+' '+esc(D.hj.year)+'هـ</div>':"")+'</div>';
  o+='<button class="cal-nav-btn" onclick="navMonth(1)" aria-label="เดือนถัดไป"'+(D.statMonthOff>=0?" disabled":"")+'>›</button>';
  o+='</div>';
  o+='<div class="cal-dow">';
  DOW_TH.forEach(function(d){o+='<div class="cal-dow-lbl">'+d+'</div>'});
  o+='</div>';
  o+='<div class="cal-grid">';
  var firstDow=new Date(viewY,viewM,1).getDay();
  for(var i=0;i<firstDow;i++)o+='<div class="cal-cell out"></div>';
  var todayDk=dateKey();
  for(var d2=1;d2<=daysInMonth;d2++){
    var dk=dateKeyOf(viewY,viewM,d2);
    var ds=D.statFilterSeg?segDayStats(D.statFilterSeg,dk):dayStats(dk);
    var pct=ds.pct;
    var bgCol,op;
    if(ds.possible===0){bgCol="transparent";op=0}
    else if(pct===0){bgCol="var(--line)";op=.5}
    else if(pct<.25){bgCol="var(--rose)";op=.22}
    else if(pct<.5){bgCol="var(--rose)";op=.4}
    else if(pct<.75){bgCol="var(--gold)";op=.5}
    else if(pct<1){bgCol="var(--matcha)";op=.65}
    else{bgCol="var(--matcha)";op=.95}
    var cls="cal-cell";
    if(dk===todayDk)cls+=" today";
    if(dk===D.statSelDate)cls+=" sel";
    var hasNote=D.notes[dk];
    var fMark=fastingSunnahMark(dk);
    o+='<div class="'+cls+'" style="--pct-bg:'+bgCol+';--pct-op:'+op+'" onclick="selCalDate(\''+dk+'\')" title="'+(fMark?fMark.title:"")+'">';
    if(fMark)o+='<span class="cc-fast '+fMark.cls+'">'+fMark.label+'</span>';
    o+='<span class="cc-n">'+d2+'</span>';
    if(hasNote)o+='<div class="cc-nt"></div>';
    o+='</div>';
  }
  o+='</div>';

  // Legend — minimal, below grid
  o+='<div class="cal-legend">';
  o+='<span class="cl-scale"><span class="cl-lab">น้อย</span>';
  ['rose .22','rose .4','gold .5','matcha .65','matcha .95'].forEach(function(spec){
    var p=spec.split(" ");
    o+='<span class="cl-sw" style="background:var(--'+p[0]+');opacity:'+p[1]+'"></span>';
  });
  o+='<span class="cl-lab">เต็ม</span></span>';
  o+='<span class="cl-sep">·</span>';
  o+='<span class="cl-item"><span class="cl-ic" style="color:var(--pp)">◯</span>สีขาว</span>';
  o+='<span class="cl-item"><span class="cl-ic" style="color:var(--gold)">☪</span>จ/พฤ</span>';
  o+='</div>';
  o+='</div>';

  // ═══ COMPACT STATS ROW (AFTER CALENDAR) ═══
  if(D.statSelDate){
    o+=buildDayDetail(D.statSelDate);
  } else {
    o+='<div class="st-summary">';
    o+='<div class="st-sum-row">';
    o+='<div class="st-sum-cell"><div class="st-sum-v">'+Math.round(avgDayPct*100)+'<span class="st-sum-u">%</span></div><div class="st-sum-l">เฉลี่ย/วัน</div></div>';
    o+='<div class="st-sum-cell"><div class="st-sum-v">'+activeDays+'<span class="st-sum-u">/'+daysInMonth+'</span></div><div class="st-sum-l">วัน active</div></div>';
    o+='<div class="st-sum-cell"><div class="st-sum-v">'+st.cur+'</div><div class="st-sum-l">ต่อเนื่อง</div></div>';
    o+='<div class="st-sum-cell"><div class="st-sum-v">'+st.best+'</div><div class="st-sum-l">สูงสุด</div></div>';
    o+='</div>';
    o+='<div class="st-sum-sub">ทำ <b>'+ps.done+'</b> จาก <b>'+ps.possible+'</b> รายการในเดือนนี้</div>';
    o+='</div>';
  }

  return o;
}

function buildYearView(){
  var o='';
  var now=new Date();
  var viewY=now.getFullYear()+D.statYearOff;
  var totDone=0,totPoss=0,monthData=[];
  for(var m=0;m<12;m++){
    var daysInM=new Date(viewY,m+1,0).getDate();
    var dks=[];
    for(var d=1;d<=daysInM;d++)dks.push(dateKeyOf(viewY,m,d));
    var ps=periodStats(dks,D.statFilterSeg);
    monthData.push({m:m,ps:ps,pct:ps.dayPcts.length?(ps.dayPcts.reduce(function(a,b){return a+b},0)/ps.dayPcts.length):0,activeDays:ps.dayPcts.filter(function(p){return p>=.5}).length});
    totDone+=ps.done;totPoss+=ps.possible;
  }
  var yrAvg=totPoss?totDone/totPoss:0;
  var activeMonths=monthData.filter(function(x){return x.pct>0}).length;
  var bestMonth=monthData.reduce(function(b,x){return x.pct>b.pct?x:b},{pct:0,m:0});

  // Year nav
  o+='<div class="yr-wrap">';
  o+='<div class="yr-nav">';
  o+='<button class="cal-nav-btn" onclick="navYear(-1)" aria-label="ปีก่อน">‹</button>';
  o+='<div class="yr-title">'+viewY+'</div>';
  o+='<button class="cal-nav-btn" onclick="navYear(1)" aria-label="ปีถัดไป"'+(D.statYearOff>=0?" disabled":"")+'>›</button>';
  o+='</div>';

  // Ring grid — 4 cols × 3 rows = exactly 12 months
  o+='<div class="yr-grid">';
  monthData.forEach(function(x){
    var pct=Math.round(x.pct*100);
    var isCur=x.m===now.getMonth()&&viewY===now.getFullYear();
    var ringCol=pct>=70?"var(--matcha)":pct>=40?"var(--gold)":pct>=15?"var(--rose-warm)":"var(--line3)";
    var dashLen=Math.round(pct*1.005); // 0-100.5
    var cls="yr-m"+(isCur?" cur":"")+(pct===0?" zero":"");
    o+='<button class="'+cls+'" onclick="selMonth('+x.m+','+viewY+')">';
    o+='<svg viewBox="0 0 40 40" class="yr-ring"><circle cx="20" cy="20" r="16" fill="none" stroke="var(--line2)" stroke-width="2"/><circle cx="20" cy="20" r="16" fill="none" stroke="'+ringCol+'" stroke-width="2" stroke-dasharray="'+dashLen+' 100.5" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>';
    o+='<div class="yr-m-inner"><div class="yr-m-v">'+pct+'<span class="yr-m-u">%</span></div></div>';
    o+='<div class="yr-m-n">'+MONTH_SH[x.m]+'</div>';
    o+='</button>';
  });
  o+='</div>';

  // Summary row below grid
  o+='<div class="yr-summary">';
  o+='<div class="yr-sum-cell"><div class="yr-sum-v">'+Math.round(yrAvg*100)+'<span class="yr-sum-u">%</span></div><div class="yr-sum-l">เฉลี่ยทั้งปี</div></div>';
  o+='<div class="yr-sum-cell"><div class="yr-sum-v">'+activeMonths+'<span class="yr-sum-u">/12</span></div><div class="yr-sum-l">เดือน active</div></div>';
  if(bestMonth.pct>0){
    o+='<div class="yr-sum-cell"><div class="yr-sum-v">'+MONTH_SH[bestMonth.m]+'</div><div class="yr-sum-l">เดือนเด่น '+Math.round(bestMonth.pct*100)+'%</div></div>';
  }
  o+='</div>';
  o+='</div>';
  return o;
}

function buildDayDetail(dk){
  var o='';

  var dObj=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var ds=dayStats(dk);
  var segBreak=SEG.map(function(sg){return{sg:sg,ss:segDayStats(sg.id,dk)}});
  var hd=hijriDayFor(dk);
  var fMark=fastingSunnahMark(dk);

  o+='<div class="cal-detail" data-swipe-day="'+dk+'" ontouchstart="_swStart(event)" ontouchmove="_swMove(event)" ontouchend="_swEnd(event,\''+dk+'\')">';
  o+='<div class="cd-hd">';

function getDaySubBreakdown(dk){
  var result=[];
  SEG.forEach(function(sg){
    var subs=D.segSubs[sg.id]||[];
    subs.forEach(function(sub){
      var total=0,done=0;
      (D.suns[sg.id]||[]).forEach(function(it,i){
        if(it.sub===sub.id){total++;if(D.todayDone[dk+"_sun_"+sg.id+"_"+i])done++}
      });
      (D.duas[sg.id]||[]).forEach(function(it,i){
        if(it.sub===sub.id){total++;if(D.todayDone[dk+"_dua_"+sg.id+"_"+i])done++}
      });
      if(total>0)result.push({sg:sg,sub:sub,total:total,done:done});
    });
  });
  return result;
}

// Collapsible: per-item performance — grouped by segment, ALL items shown
function buildItemPerfSection(){
  var o='';
  // Build grouped data per segment (filtered)
  var grouped=[];
  SEG.forEach(function(sg){
    if(D.statFilterSeg&&D.statFilterSeg!==sg.id)return;
    var items=[];
    (D.suns[sg.id]||[]).forEach(function(it,idx){
      var p=itemPerf("sun",sg.id,idx,30);
      items.push({type:"sun",sg:sg,it:it,idx:idx,pct:p.pct,hit:p.hit,cap:p.cap});
    });
    (D.duas[sg.id]||[]).forEach(function(it,idx){
      var p=itemPerf("dua",sg.id,idx,30);
      items.push({type:"dua",sg:sg,it:it,idx:idx,pct:p.pct,hit:p.hit,cap:p.cap,isDua:true});
    });
    if(items.length){
      items.sort(function(a,b){return b.pct-a.pct});
      grouped.push({sg:sg,items:items});
    }
  });

  // Summary — 3 consistency tiers
  var allItems=[];
  grouped.forEach(function(g){allItems=allItems.concat(g.items)});
  if(allItems.length===0)return "";

  // Overview: top 5, mid, low
  var sortedAll=allItems.slice().sort(function(a,b){return b.pct-a.pct});
  var top=sortedAll.slice(0,5);
  var low=sortedAll.filter(function(x){return x.pct<0.5}).slice(-5).reverse();

  // TOP section
  var topOpen=D.statSegOpen["_top"]!==false;
  o+='<div class="st-sec'+(topOpen?" open":"")+'" data-statkey="_top">';
  o+='<div class="st-sec-hd" onclick="tglStSec(\'_top\')">';
  o+='<span class="st-sec-ic">✦</span>';
  o+='<span class="st-sec-ttl">ทำสม่ำเสมอ</span>';
  o+='<span class="st-sec-ct">'+top.length+' อันดับแรก</span>';
  o+='<span class="st-sec-arr">⌄</span>';
  o+='</div>';
  o+='<div class="st-sec-bd">';
  o+='<div class="ip-list">';
  top.forEach(function(x){o+=renderIpItem(x,x.pct>=0.7?"hi":(x.pct>=0.4?"mid":""))});
  o+='</div>';
  o+='</div></div>';

  // LOW section (only if exists)
  if(low.length){
    var lowOpen=D.statSegOpen["_low"]!==false;
    o+='<div class="st-sec'+(lowOpen?" open":"")+'" data-statkey="_low">';
    o+='<div class="st-sec-hd" onclick="tglStSec(\'_low\')">';
    o+='<span class="st-sec-ic">◌</span>';
    o+='<span class="st-sec-ttl">ต้องให้ความสนใจ</span>';
    o+='<span class="st-sec-ct">'+low.length+' รายการ</span>';
    o+='<span class="st-sec-arr">⌄</span>';
    o+='</div>';
    o+='<div class="st-sec-bd">';
    o+='<div class="ip-list">';
    low.forEach(function(x){o+=renderIpItem(x,x.pct<0.25?"low":"mid")});
    o+='</div>';
    o+='</div></div>';
  }

  // ALL ITEMS by segment (collapsible)
  var allOpen=D.statSegOpen["_all"]===true;
  o+='<div class="st-sec'+(allOpen?" open":"")+'" data-statkey="_all">';
  o+='<div class="st-sec-hd" onclick="tglStSec(\'_all\')">';
  o+='<span class="st-sec-ic">◇</span>';
  o+='<span class="st-sec-ttl">ทุกรายการตามช่วง</span>';
  o+='<span class="st-sec-ct">'+allItems.length+' รายการ</span>';
  o+='<span class="st-sec-arr">⌄</span>';
  o+='</div>';
  o+='<div class="st-sec-bd">';
  grouped.forEach(function(g){
    o+='<div style="margin-bottom:12px">';
    o+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--line)">';
    o+='<span style="font-family:var(--fa);color:'+segAc(g.sg)+';font-size:13px">'+g.sg.sym+'</span>';
    o+='<span style="font-family:var(--fa);color:'+segAc(g.sg)+';font-size:13px;font-weight:600">'+g.sg.lb+'</span>';
    o+='<span style="font-size:10px;color:var(--tx2);letter-spacing:.3px">'+esc(g.sg.th)+'</span>';
    o+='<span style="font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:.5px;margin-left:auto;font-weight:500">'+g.items.length+' items</span>';
    o+='</div>';
    o+='<div class="ip-list">';
    g.items.forEach(function(x){
      var cls=x.pct>=0.7?"hi":(x.pct<0.25?"low":(x.pct<0.5?"mid":""));
      o+=renderIpItem(x,cls);
    });
    o+='</div>';
    o+='</div>';
  });
  o+='</div></div>';
  return o;
}

  o+=settingsSec("about","ⓘ","حَوْل","เกี่ยวกับ",function(){

    oo+='</div>';

  return o;
}

function tglDrill(key){D.statItemDrill=D.statItemDrill===key?null:key;render()}

// Swipe gesture
var _sw={sx:0,sy:0,t:0,active:false};
function _swStart(e){
  if(!e.touches||!e.touches[0])return;
  _sw.sx=e.touches[0].clientX;_sw.sy=e.touches[0].clientY;
  _sw.t=Date.now();_sw.active=true;
}
function _swMove(e){if(!_sw.active||!e.touches||!e.touches[0])return}
function _swEnd(e,dk){
  if(!_sw.active)return;
  _sw.active=false;
  if(!e.changedTouches||!e.changedTouches[0])return;
  var dx=e.changedTouches[0].clientX-_sw.sx;
  var dy=e.changedTouches[0].clientY-_sw.sy;
  var dt=Date.now()-_sw.t;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5&&dt<500){
    navDetailDay(dk,dx>0?-1:1);
  }
}
function navDetailDay(curDk,dir){
  var parts=curDk.split("-");
  var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setDate(d.getDate()+dir);
  var today=new Date();today.setHours(0,0,0,0);
  if(d>today)return;
  var newDk=dateKey(d);
  D.statSelDate=newDk;
  D.noteDraft=D.notes[newDk]||"";
  if(D.statPeriod==="month"){
    var now=new Date();
    D.statMonthOff=(d.getFullYear()-now.getFullYear())*12+(d.getMonth()-now.getMonth());
  }
  render();
}

function doReset(){
  if(confirm("ล้างข้อมูลทั้งหมด?\n\n• ซุนนะฮ์ · ดุอาอ์ · กิจกรรม · โน้ต · สถิติ — ทุกรายการจะถูกลบจนเหลือ 0\n• การกระทำนี้กลับไม่ได้")){
    // Hard-clear — every collection becomes empty, defaults will NOT repopulate
    SEG.forEach(function(s){
      D.suns[s.id]=[];
      D.duas[s.id]=[];
      D.segSubs[s.id]=[];
      D.duaIdx[s.id]=0;
    });
    D.todayDone={};
    D.dayTotals={};
    D.notes={};
    D.activities=[];
    D.hRef={};
    D.hjOffset=0;
    D.act=null;D.sub=null;D.tab="sunnah";
    D.menuOpen=null;D.editOpen=null;
    D.statSelDate=null;D.statItemDrill=null;D.statFilterSeg=null;
    D.addSheetOpen=false;D.addSheetMode=null;D.fabOpen=false;
    // Clear old version keys too, then save fresh empty state
    ["sc18","sc16","sc15","sc14"].forEach(function(k){localStorage.removeItem(k)});
    sv();
    render();
    setTimeout(function(){alert("ล้างเรียบร้อย · เริ่มต้นจาก 0 ✓")},50);
  }
}
function clearSystemDefaults(){
  var sysSun=0,sysDua=0;
  SEG.forEach(function(sg){
    (D.suns[sg.id]||[]).forEach(function(it){if(it.sys)sysSun++});
    (D.duas[sg.id]||[]).forEach(function(it){if(it.sys)sysDua++});
  });
  if(sysSun+sysDua===0){alert("ไม่มีรายการระบบให้ลบ");return}
  if(!confirm("ลบรายการของระบบทั้งหมด? ("+sysSun+" ซุนนะฮ์ + "+sysDua+" ดุอาอ์)\nรายการที่คุณเพิ่มเองจะเก็บไว้"))return;
  // Must rebuild todayDone indexes since we're splicing arrays
  var newTodayDone={};
  SEG.forEach(function(sg){
    var oldSuns=D.suns[sg.id]||[];
    var newSuns=[];var sunMap={};
    oldSuns.forEach(function(it,oldIdx){if(!it.sys){sunMap[oldIdx]=newSuns.length;newSuns.push(it)}});
    var oldDuas=D.duas[sg.id]||[];
    var newDuas=[];var duaMap={};
    oldDuas.forEach(function(it,oldIdx){if(!it.sys){duaMap[oldIdx]=newDuas.length;newDuas.push(it)}});
    D.suns[sg.id]=newSuns;
    D.duas[sg.id]=newDuas;
    if(D.duaIdx[sg.id]>=newDuas.length)D.duaIdx[sg.id]=0;
    // Remap todayDone keys for this seg
    Object.keys(D.todayDone).forEach(function(k){
      var mm=k.match(/^(\d{4}-\d{2}-\d{2})_(sun|dua)_([^_]+)_(\d+)$/);
      if(!mm)return;
      if(mm[3]!==sg.id){newTodayDone[k]=D.todayDone[k];return}
      var oldI=parseInt(mm[4]);
      var newI=mm[2]==="sun"?sunMap[oldI]:duaMap[oldI];
      if(newI!==undefined)newTodayDone[mm[1]+"_"+mm[2]+"_"+mm[3]+"_"+newI]=D.todayDone[k];
    });
  });
  // Keep non-matching keys (shouldn't be any but safe)
  Object.keys(D.todayDone).forEach(function(k){
    var mm=k.match(/^(\d{4}-\d{2}-\d{2})_(sun|dua)_([^_]+)_(\d+)$/);
    if(!mm&&D.todayDone[k])newTodayDone[k]=D.todayDone[k];
  });
  D.todayDone=newTodayDone;
  sv();render();
  alert("ลบรายการระบบเรียบร้อย ✓");
}
function restoreSystemDefaults(){
  var added=0;
  SEG.forEach(function(sg){
    if(!D.suns[sg.id])D.suns[sg.id]=[];
    if(!D.duas[sg.id])D.duas[sg.id]=[];
    // Check which system defaults are already in the list
    (sg.sun||[]).forEach(function(def){
      var exists=D.suns[sg.id].some(function(it){return it.sys&&it.t===def.t});
      if(!exists){D.suns[sg.id].push({t:def.t,h:def.h,sub:null,sys:true});added++}
    });
    (sg.dua||[]).forEach(function(def){
      var exists=D.duas[sg.id].some(function(it){return it.sys&&it.ar===def.ar});
      if(!exists){D.duas[sg.id].push({ar:def.ar,tl:def.tl,mn:def.mn,sub:null,sys:true});added++}
    });
  });
  sv();render();
  if(added===0)alert("รายการระบบครบถ้วนอยู่แล้ว ✓");
  else alert("คืนรายการระบบ "+added+" รายการ ✓");
}
function doExport(){
  var d={suns:D.suns,duas:D.duas,segSubs:D.segSubs,todayDone:D.todayDone,dayTotals:D.dayTotals,duaIdx:D.duaIdx,notes:D.notes,activities:D.activities,theme:D.theme,hjOffset:D.hjOffset,v:20};
  var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="sunnah_v20_"+dateKey()+".json";
  a.click();
}
function doImport(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      ["suns","duas","segSubs","todayDone","dayTotals","duaIdx","notes","activities","theme","hjOffset"].forEach(function(k){
        if(d[k]!==undefined)D[k]=d[k];
      });
      sv();render();
      alert("นำเข้าสำเร็จ ✓");
    }catch(err){alert("ไฟล์ไม่ถูกต้อง")}
  };
  r.readAsText(f);
  e.target.value="";
}

function fetchPT(){
  var d=new Date();
  fetch("https://api.aladhan.com/v1/timingsByCity/"+d.getDate()+"-"+(d.getMonth()+1)+"-"+d.getFullYear()+"?city=Bangkok&country=Thailand&method=3")
    .then(function(r){return r.json()})
    .then(function(j){
      if(j.code===200){
        D.pt=j.data.timings;D.hj=j.data.date.hijri;D.gd=j.data.date.gregorian.date;
        applyTh();render();
      }
    })
    .catch(function(){
      D.pt={Fajr:"05:15",Sunrise:"06:18",Dhuhr:"12:15",Asr:"15:30",Maghrib:"18:25",Isha:"19:38"};
      applyTh();render();
    });
}

if(!D.dayTotals[dateKey()])D.dayTotals[dateKey()]=computeTotals();
fetchPT();render();
setInterval(function(){
  // Skip re-render if there's active form/edit to preserve input
  if(D.editOpen||D.actEditId!==null||D.addSheetOpen||D.subFormOpen||D.subEditKey)return;
  var active=document.activeElement;
  if(active&&(active.tagName==="INPUT"||active.tagName==="TEXTAREA"||active.tagName==="SELECT"))return;
  applyTh();render();
},60000);
