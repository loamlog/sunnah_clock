<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>ساعة الحياة السنية · v20</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Amiri+Quran&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&family=Scheherazade+New:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

/* ══════════════ NIGHT — Deep Obsidian + Pearled Gold ══════════════ */
:root{
  --bg:#06060d;--bg2:#0b0b16;
  --card:#0e0e1a;--card2:#13131f;--card3:#181824;
  --tx:#ebe2cd;--tx2:rgba(235,226,205,.6);--tx3:rgba(235,226,205,.34);--tx4:rgba(235,226,205,.14);--tx5:rgba(235,226,205,.06);
  --gold:#c9a26a;--gold-warm:#dcb780;--gold-deep:#a8855a;
  --gold-soft:rgba(201,162,106,.12);--gold-ghost:rgba(201,162,106,.05);--gold-line:rgba(201,162,106,.22);
  --rose:#b89399;--rose-warm:#caa3a9;--rose-deep:#8d6a70;
  --rose-soft:rgba(184,147,153,.1);--rose-ghost:rgba(184,147,153,.04);--rose-line:rgba(184,147,153,.2);
  --rose-pastel:#d4b1b7;
  --matcha:#9ab186;--matcha-warm:#afc59d;--matcha-deep:#728860;
  --matcha-soft:rgba(154,177,134,.1);--matcha-ghost:rgba(154,177,134,.04);--matcha-line:rgba(154,177,134,.2);
  --pp:#a88cc4;--gn:#85aa78;--gn-soft:rgba(133,170,120,.13);--rd:#c46668;--bl:#7aa0c8;
  --line:rgba(235,226,205,.06);--line2:rgba(235,226,205,.11);--line3:rgba(235,226,205,.2);
  --panel-inset:inset 0 1px 0 rgba(255,240,200,.04);
  --ambient:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,162,106,.1) 0%,transparent 60%),radial-gradient(ellipse at 50% 100%,rgba(168,140,196,.04) 0%,transparent 70%);
  --bg-grad:radial-gradient(ellipse at 50% -20%,#141428 0%,#08081a 55%,#05050c 100%);
  --fd:'Fraunces',serif;--fh:'Cormorant Garamond',serif;--fa:'Noto Naskh Arabic',serif;--fq:'Amiri Quran','Scheherazade New',serif;--fs:'Scheherazade New',serif;--f:'Noto Sans Thai',system-ui,sans-serif;
  --sg-bfajr:#1c1a34;--sg-fajr:#20304e;--sg-duha:#362e1b;--sg-dhuhr:#2a240c;--sg-asr:#261a04;--sg-maghrib:#271206;--sg-isha:#101028;
  --clock-bg:#09091a;--clock-ring:rgba(201,162,106,.1);
  --shadow-soft:0 8px 28px rgba(0,0,0,.4);
}

/* ══════════════ DAY — Matcha & Cream · Quiet Luxury · Professional ══════════════ */
body.L{
  --bg:#f7f2e8;--bg2:#ece2cc;
  --card:#ffffff;--card2:#f5efe2;--card3:#eadfc8;
  --tx:#18120a;--tx2:rgba(24,18,10,.66);--tx3:rgba(24,18,10,.4);--tx4:rgba(24,18,10,.14);--tx5:rgba(24,18,10,.05);
  --gold:#8a6516;--gold-warm:#a07b24;--gold-deep:#5c4308;
  --gold-soft:rgba(138,101,22,.085);--gold-ghost:rgba(138,101,22,.03);--gold-line:rgba(138,101,22,.2);
  --rose:#a85062;--rose-warm:#bc6e7f;--rose-deep:#782d40;
  --rose-soft:rgba(168,80,98,.09);--rose-ghost:rgba(168,80,98,.035);--rose-line:rgba(168,80,98,.22);
  --rose-pastel:#e0bbc5;
  --matcha:#6a8a42;--matcha-warm:#85a55c;--matcha-deep:#3c5420;
  --matcha-soft:rgba(106,138,66,.12);--matcha-ghost:rgba(106,138,66,.04);--matcha-line:rgba(106,138,66,.24);
  --pp:#664484;--gn:#557737;--gn-soft:rgba(85,119,55,.11);--rd:#a33432;--bl:#386690;
  --line:rgba(24,18,10,.055);--line2:rgba(24,18,10,.1);--line3:rgba(24,18,10,.2);
  --panel-inset:none;
  --ambient:
    radial-gradient(ellipse 55% 38% at 12% 5%,rgba(165,130,55,.12) 0%,transparent 62%),
    radial-gradient(ellipse 58% 44% at 92% 96%,rgba(120,155,70,.18) 0%,transparent 65%),
    radial-gradient(ellipse 38% 28% at 82% 18%,rgba(195,100,118,.07) 0%,transparent 70%),
    radial-gradient(ellipse 70% 48% at 50% 52%,rgba(242,222,168,.05) 0%,transparent 75%);
  --bg-grad:linear-gradient(172deg,#faf4e6 0%,#f1e8d2 55%,#e6d9b6 100%);
  --sg-bfajr:#e4d9ea;--sg-fajr:#f5deb8;--sg-duha:#f3e6c5;--sg-dhuhr:#e8ccae;--sg-asr:#e2b99a;--sg-maghrib:#e3ada6;--sg-isha:#cec2db;
  --clock-bg:#ffffff;--clock-ring:rgba(138,101,22,.12);
  --shadow-soft:0 4px 22px rgba(138,101,22,.06),0 2px 10px rgba(106,138,66,.05);
}

html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--tx);font-family:var(--f);font-size:14px;line-height:1.5;transition:background .6s,color .6s;padding-bottom:env(safe-area-inset-bottom);position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:var(--ambient);transition:opacity .6s}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--gold-line);border-radius:9px}

.app{max-width:440px;margin:0 auto;padding:14px 14px 110px;min-height:100vh;position:relative;z-index:1}

/* Watch-face Header — minimal, clock-feel */
.wf-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:8px 4px 14px;margin-bottom:8px}
.wf-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.wf-time{font-family:var(--fd);font-size:38px;font-weight:300;letter-spacing:.5px;color:var(--tx);line-height:.95;font-variant-numeric:tabular-nums}
.wf-time .wf-sec{font-size:13px;color:var(--tx3);font-weight:400;margin-left:4px;letter-spacing:.5px;vertical-align:2px}
.wf-meta{display:flex;align-items:baseline;flex-wrap:wrap;gap:7px;margin-top:3px;font-size:10.5px;color:var(--tx2);letter-spacing:.3px;font-weight:400}
.wf-meta .wf-greg{color:var(--tx)}
.wf-meta .wf-sep{color:var(--tx4);font-size:9px}
.wf-meta .wf-hj{font-family:var(--fa);color:var(--gold);font-size:12.5px;font-weight:500;letter-spacing:.2px;cursor:pointer;padding:0 1px;border-radius:3px;transition:background .2s}
.wf-meta .wf-hj:active{background:var(--gold-soft)}
.wf-meta .wf-hj-off{font-family:var(--fd);font-size:9px;color:var(--rose-deep);font-weight:600;letter-spacing:.5px;font-style:italic;margin-left:3px}
.wf-side{flex-shrink:0;display:flex;align-items:flex-start;padding-top:4px}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:0 2px 7px;border-bottom:1px solid var(--line);margin-bottom:8px}
.hdr .h-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:0}
.hdr .h-date{font-family:var(--fd);font-size:10.5px;font-weight:400;color:var(--tx);letter-spacing:.3px;font-feature-settings:'smcp','c2sc'}
.hdr .h-hj{font-family:var(--fa);font-size:12.5px;color:var(--gold);font-weight:500;line-height:1.2;display:inline-flex;align-items:center;gap:5px}
.hdr .h-hj .h-hj-txt{cursor:pointer;padding:1px 2px;border-radius:4px;transition:background .2s}
.hdr .h-hj .h-hj-txt:active{background:var(--gold-soft)}
.hdr .h-hj-off{font-family:var(--fd);font-size:8.5px;color:var(--rose-deep);font-weight:600;letter-spacing:.5px;font-style:italic;opacity:.85}
.th-circ{width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;color:var(--gold)}
body:not(.L) .th-circ{box-shadow:0 0 12px rgba(201,162,106,.12),inset 0 1px 0 rgba(255,240,200,.05)}
body.L .th-circ{box-shadow:0 2px 8px rgba(184,122,133,.06)}
.th-circ:active{transform:scale(.88) rotate(-10deg)}
.th-circ::after{content:attr(data-mode);position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:6.5px;letter-spacing:1.4px;color:var(--tx3);text-transform:uppercase;font-weight:500;white-space:nowrap;pointer-events:none}

/* Page header (non-home views) */
.page-hdr{display:flex;align-items:center;gap:12px;padding:6px 2px 14px;margin-bottom:16px;border-bottom:1px solid var(--line)}
.page-back{width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid var(--line2);color:var(--tx2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;font-family:var(--fd);font-weight:300;line-height:1;letter-spacing:-2px;padding-right:2px}
body.L .page-back{box-shadow:0 1px 3px rgba(24,18,10,.04)}
.page-back:hover{border-color:var(--line3);color:var(--tx)}
.page-back:active{transform:scale(.88);color:var(--gold);border-color:var(--gold-line)}
.page-hdr-ttl{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.page-hdr-ar{font-family:var(--fa);font-size:18px;font-weight:600;color:var(--gold);line-height:1.15;letter-spacing:.3px}
.page-hdr-th{font-family:var(--fd);font-size:10.5px;color:var(--tx2);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}

/* Smart alerts */
.alerts{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.alert{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:10px;background:var(--card);border:1px solid var(--gold-line);box-shadow:var(--panel-inset);position:relative;overflow:hidden}
.alert::before{content:'';position:absolute;inset:0;opacity:.06;background:linear-gradient(90deg,var(--gold) 0%,transparent 70%);pointer-events:none}
.alert.alert-rose::before{background:linear-gradient(90deg,var(--rose) 0%,transparent 70%)}
.alert.alert-rose{border-color:var(--rose-line)}
.alert .a-ic{font-family:var(--fa);font-size:16px;color:var(--gold);flex-shrink:0;width:24px;text-align:center;font-weight:500}
.alert.alert-rose .a-ic{color:var(--rose-warm)}
.alert .a-bd{flex:1;min-width:0;position:relative;z-index:1}
.alert .a-ar{font-family:var(--fa);font-size:12px;color:var(--gold);font-weight:600;line-height:1.2;letter-spacing:.2px}
.alert.alert-rose .a-ar{color:var(--rose-deep)}
.alert .a-th{font-size:9.5px;color:var(--tx2);margin-top:1px;letter-spacing:.3px;line-height:1.3}
.alert .a-tag{font-family:var(--fd);font-size:7.5px;letter-spacing:1.2px;color:var(--tx3);text-transform:uppercase;padding:2px 6px;border:1px solid var(--line2);border-radius:20px;flex-shrink:0;position:relative;z-index:1}

/* Prayer Strip */
.p-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px;transition:background .5s,border-color .5s;box-shadow:var(--panel-inset)}
body.L .p-strip{box-shadow:0 1px 2px rgba(24,18,10,.025)}
.p-cell{text-align:center;padding:8px 2px 9px;background:var(--card);position:relative;transition:background .5s}
.p-cell.cur{background:linear-gradient(180deg,var(--gold-ghost) 0%,var(--card) 70%)}
.p-cell .pa{font-family:var(--fa);font-size:13px;color:var(--gold);line-height:1.15;font-weight:500;letter-spacing:.1px}
.p-cell.cur .pa{color:var(--gold);font-weight:600}
.p-cell .pt{font-family:var(--fd);font-size:11px;font-weight:500;color:var(--tx);margin-top:2px;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.p-cell .pn{font-size:7.5px;color:var(--tx3);margin-top:1px;letter-spacing:.4px;font-weight:400;text-transform:uppercase}
.p-cell.cur .pn{color:var(--gold);opacity:.7}
.p-cell.cur::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 2px 2px}
.p-cell.cur::after{content:'';position:absolute;bottom:3px;left:50%;width:3px;height:3px;border-radius:50%;background:var(--gold);transform:translateX(-50%);box-shadow:0 0 4px var(--gold-line);animation:pulse 2s infinite}

/* Countdown hero */
.cd-hero{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 13px;margin:0 0 10px;background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--panel-inset);transition:all .4s;position:relative;overflow:hidden}
body:not(.L) .cd-hero{box-shadow:0 0 18px rgba(201,162,106,.04),var(--panel-inset)}
body.L .cd-hero{box-shadow:0 2px 14px rgba(184,122,133,.05)}
.cd-hero .cd-lab{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.cd-hero .cd-eyebrow{font-family:var(--fd);font-size:8px;color:var(--tx3);letter-spacing:1.8px;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:5px}
.cd-hero .cd-eyebrow::before{content:'';width:14px;height:1px;background:var(--gold-line)}
.cd-hero .cd-name{font-family:var(--fa);font-size:16px;color:var(--gold);font-weight:600;line-height:1.15;letter-spacing:.3px;display:flex;align-items:baseline;gap:6px}
.cd-hero .cd-th{font-size:10px;color:var(--tx2);font-family:var(--f);font-weight:400;letter-spacing:.3px}
.cd-hero .cd-clock{text-align:right;flex-shrink:0}
.cd-hero .cd-big{font-family:var(--fd);font-size:19px;font-weight:500;color:var(--tx);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:.3px}
.cd-hero .cd-u{font-size:9.5px;color:var(--tx3);font-weight:400;margin-left:1px;letter-spacing:.3px}
.cd-hero .cd-time-at{font-family:var(--fd);font-size:8.5px;color:var(--tx3);margin-top:2px;letter-spacing:.8px;font-variant-numeric:tabular-nums;text-transform:uppercase;font-weight:500}

/* Night/day strip */
.n-strip{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;font-family:var(--fd);font-size:10px;color:var(--tx3);letter-spacing:1px;font-weight:500;padding:2px 0}
.n-pair{display:flex;align-items:center;gap:6px}
.n-lbl{text-transform:uppercase;font-size:8px;letter-spacing:1.4px}
.n-val{color:var(--gold);font-weight:600;font-size:11px;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.n-sep{color:var(--tx4);font-size:8px}

/* Clock */
.clock-box{position:relative;width:100%;max-width:360px;margin:0 auto 10px;aspect-ratio:1/1}
.clock-box svg{width:100%;height:100%;display:block}
.now-chip{position:absolute;top:14%;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line2);padding:2.5px 9px 2.5px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;font-family:var(--fd);font-size:11px;font-weight:500;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.4px;z-index:3}
.now-dot{width:5px;height:5px;border-radius:50%;background:var(--matcha);animation:pulse 2s infinite}
.now-seg-lbl{position:absolute;top:26%;left:50%;transform:translateX(-50%);font-family:var(--fa);font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.3px;text-align:center;z-index:2;opacity:.7}
.clock-cap{text-align:center;margin-top:-6px;font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:3px;text-transform:uppercase;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
.c-pct{font-family:var(--fd);font-size:14px;color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.5px;text-transform:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Segment Pills */
.seg-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.s-pill{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px 5px;background:var(--card);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:all .25s;position:relative;color:var(--tx2);overflow:hidden}
.s-pill:active{transform:scale(.95)}
.s-pill.cur{background:var(--gold-soft);border-color:var(--gold-line);color:var(--tx)}
.s-pill.sel{background:var(--card2);border-color:var(--gold);color:var(--tx);box-shadow:0 0 14px rgba(201,162,106,.18)}
body.L .s-pill.sel{box-shadow:0 0 14px rgba(138,101,36,.2)}
.s-pill.past{opacity:.4}
.s-pill .s-sym{font-family:var(--fa);font-size:13px;color:var(--gold);line-height:1;font-weight:500}
.s-pill .s-lbl{font-size:8.5px;letter-spacing:.2px;line-height:1.1;font-weight:400}
.s-pill .s-prog{display:block;width:100%;height:2px;background:var(--line2);border-radius:2px;overflow:hidden;margin-top:2px}
.s-pill .s-prog-f{display:block;height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.s-pill.cur .s-prog-f,.s-pill.sel .s-prog-f{background:linear-gradient(90deg,var(--gold),var(--gold-warm))}

/* Panel */
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 14px 12px;margin-bottom:14px;box-shadow:var(--panel-inset);transition:all .4s;position:relative;overflow:hidden}
body:not(.L) .panel{box-shadow:0 0 26px rgba(201,162,106,.03),var(--panel-inset)}
body.L .panel{box-shadow:0 3px 20px rgba(184,122,133,.05),0 1px 8px rgba(166,120,32,.04)}
.p-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.p-mark{width:3px;height:30px;border-radius:2px;flex-shrink:0;opacity:.85}
.p-inf{flex:1;min-width:0}
.p-ar{font-family:var(--fa);font-size:19px;font-weight:600;letter-spacing:.3px;line-height:1.15}
.p-sub{display:flex;align-items:center;gap:5px;margin-top:2px;font-size:10px;color:var(--tx2);font-weight:500}
.p-sub .th{color:var(--tx);font-weight:500}
.p-sub .sep{color:var(--tx4);font-size:8px}
.p-ring{position:relative;width:38px;height:38px;flex-shrink:0}
.p-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.p-ring .rt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:10px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums}
.p-back{width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid var(--line2);color:var(--tx2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.p-back:active{transform:scale(.9);color:var(--gold)}
.cur-act-row{display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:6px;background:var(--card2);border-radius:8px;font-size:11px}
.ca-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ca-n{flex:1;color:var(--tx)}
.ca-t{font-family:var(--fd);font-size:9.5px;color:var(--tx3);letter-spacing:.4px;font-variant-numeric:tabular-nums}

/* Panel tabs */
.p-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:3px;background:var(--card2);border-radius:10px;margin:10px 0 12px;border:1px solid var(--line)}
.p-tab{padding:8px 6px;background:transparent;border:none;cursor:pointer;font-family:var(--f);font-size:11px;font-weight:500;color:var(--tx2);border-radius:8px;letter-spacing:.3px;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:6px}
.p-tab.on{background:var(--card);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08),inset 0 0 0 1px var(--gold-line)}
.p-tab .tc{font-family:var(--fd);font-size:9.5px;color:var(--tx3);font-variant-numeric:tabular-nums;letter-spacing:.5px;font-weight:500}
.p-tab.on .tc{color:var(--gold)}
.p-tab:active{transform:scale(.97)}

.sec-lbl{display:flex;align-items:center;justify-content:space-between;margin:0 0 8px;font-family:var(--fd);font-size:9.5px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;font-weight:500}
.sec-stat{font-family:var(--fd);font-size:10px;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.5px;font-weight:600;text-transform:none}

/* Sunnah list */
.sun-list{display:flex;flex-direction:column;gap:4px}
.sun-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;background:var(--card2);border-radius:9px;cursor:pointer;transition:background .3s,opacity .3s,transform .2s;position:relative;border:1px solid transparent}
.sun-item:active{transform:scale(.99)}
.sun-item.done{opacity:.48}
.sun-item.done .s-tx{text-decoration:line-through;text-decoration-color:var(--tx3);text-decoration-thickness:.5px}
.s-ck{width:15px;height:15px;border-radius:50%;border:1.3px solid var(--line3);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;transition:all .3s}
.sun-item.done .s-ck{background:var(--matcha);border-color:var(--matcha);color:#fff}
.s-bd{flex:1;min-width:0}
.s-tx{font-size:11.5px;color:var(--tx);line-height:1.4;font-weight:400;display:flex;align-items:center;flex-wrap:wrap;gap:5px;letter-spacing:.1px}
.s-tag{font-family:var(--fa);font-size:9.5px;color:var(--gold);background:var(--gold-soft);padding:1px 6px;border-radius:7px;font-weight:500;letter-spacing:.2px}
.s-h-tg{font-family:var(--fd);font-size:9px;color:var(--tx3);margin-top:3px;cursor:pointer;letter-spacing:.3px;font-style:italic;transition:color .2s}
.s-h-tg:hover{color:var(--gold)}
.s-mn{width:20px;height:20px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--tx3);font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.5;transition:all .2s;padding:0}
.s-mn:hover,.s-mn.on{opacity:1;color:var(--gold);background:var(--gold-ghost)}
.s-mn:active{transform:scale(.85)}

/* Inline action row */
.s-actions{display:flex;gap:4px;padding:7px 8px;margin-top:-2px;margin-bottom:2px;background:var(--card3);border-radius:8px}
.s-act-btn{flex:1;padding:7px;background:var(--card);border:1px solid var(--line2);border-radius:7px;cursor:pointer;font-family:var(--f);font-size:10.5px;color:var(--tx);letter-spacing:.3px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500}
.s-act-btn:active{transform:scale(.96)}
.s-act-btn.del{color:var(--rd)}
.s-act-btn.del:hover{background:rgba(196,102,104,.08)}
.s-act-btn .sa-ic{font-family:var(--fa);font-size:11px;opacity:.9}

/* Inline edit form */
.s-edit{padding:10px;margin-top:-2px;margin-bottom:4px;background:var(--card3);border-radius:10px;display:flex;flex-direction:column;gap:6px}
.s-edit input,.s-edit select,.s-edit textarea{width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--line2);border-radius:7px;font-family:var(--f);font-size:12px;color:var(--tx);outline:none;transition:border-color .2s}
.s-edit input.ar-in{font-family:var(--fa);font-size:16px;text-align:right;direction:rtl;line-height:1.6}
.s-edit input:focus,.s-edit select:focus,.s-edit textarea:focus{border-color:var(--gold)}
.s-edit-row{display:flex;gap:5px}
.s-edit-row .s-act-btn{flex:1}
.s-edit-row .s-act-btn.save{background:var(--gold);color:#fff;border-color:var(--gold)}

/* Dua block */
.dua-blk{padding:14px 16px 12px;margin-bottom:8px;background:var(--card2);border-radius:12px;position:relative;border:1px solid var(--line)}
.dua-blk::before{content:'❖';position:absolute;top:12px;right:14px;color:var(--gold);font-size:11px;opacity:.42;font-family:var(--fa)}
.dua-ar{font-family:var(--fq);font-size:20px;font-weight:400;color:var(--tx);line-height:2.05;text-align:right;direction:rtl;letter-spacing:0;margin-bottom:10px;padding-right:22px;padding-left:4px;word-spacing:1px}
.dua-tl{font-family:var(--fh);font-size:11.5px;font-style:italic;color:var(--gold);margin-bottom:3px;letter-spacing:.3px;line-height:1.4}
.dua-mn{font-size:11.5px;color:var(--tx2);line-height:1.55}
.dua-empty{text-align:center;padding:20px;color:var(--tx3);font-size:12px;font-style:italic}
.dua-check{display:flex;align-items:center;gap:7px;margin-top:10px;padding:7px 12px;background:var(--card);border:1px solid var(--line2);border-radius:8px;cursor:pointer;font-size:11px;color:var(--tx2);font-weight:500;letter-spacing:.3px;transition:all .25s;width:fit-content}
.dua-check.done{background:var(--matcha-soft);border-color:var(--matcha);color:var(--matcha-deep)}
.dua-check.done .dc-ic{background:var(--matcha);color:#fff;border-color:var(--matcha)}
.dua-check:active{transform:scale(.98)}
.dua-check .dc-ic{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.dua-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--line)}
.nav-arr{width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--line2);color:var(--tx2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-arr:active{transform:scale(.88)}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--line3);cursor:pointer;transition:all .2s}
.nav-dot.on{background:var(--gold);transform:scale(1.6)}
.dua-tools{position:absolute;top:10px;left:10px;display:flex;gap:3px;z-index:2}
.dua-tools .s-mn{width:24px;height:24px;font-size:12px}

.empty{text-align:center;padding:32px 20px;color:var(--tx3);font-size:12px;line-height:1.6;font-style:normal;border:1px dashed var(--line2);border-radius:12px;margin-bottom:10px;background:var(--tx5);font-family:var(--f);letter-spacing:.3px}
.empty b{color:var(--tx2);font-family:var(--fd);font-weight:500;font-size:13px;display:block;margin-bottom:4px;letter-spacing:.5px}

/* Focus Now bar */
.focus-now{display:flex;align-items:center;gap:8px;padding:6px 11px;margin:6px 0 10px;background:var(--gold-ghost);border:1px solid var(--gold-line);border-radius:22px;font-size:10.5px;color:var(--tx)}
.focus-now.focus-done{background:var(--matcha-ghost);border-color:var(--matcha-line)}
.fn-ic{font-family:var(--fa);font-size:12px;color:var(--gold);flex-shrink:0}
.focus-now.focus-done .fn-ic{color:var(--matcha-deep)}
.fn-tx{flex:1;color:var(--tx);font-weight:500;line-height:1.3;letter-spacing:.1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fn-pct{font-family:var(--fd);font-size:11px;color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.3px;flex-shrink:0}
.focus-now.focus-done .fn-pct{color:var(--matcha-deep)}

/* Dock — fixed bottom tab bar */
.dock{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);width:calc(100% - 20px);max-width:440px;display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:5px;background:var(--card);border:1px solid var(--line2);border-radius:16px;z-index:40;box-shadow:0 6px 26px rgba(0,0,0,.18)}
body.L .dock{box-shadow:0 4px 18px rgba(184,122,133,.14),0 2px 8px rgba(166,120,32,.06)}
.d-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px 6px;background:transparent;border:none;cursor:pointer;color:var(--tx2);font-family:var(--f);font-size:9.5px;font-weight:500;letter-spacing:.3px;transition:all .25s;border-radius:11px}
.d-btn:active{transform:scale(.94)}
.d-btn.on{background:var(--gold-soft);color:var(--gold)}
.d-btn .d-ic{font-size:17px;line-height:1;color:var(--gold);font-family:var(--fa);font-weight:400;opacity:.85}
.d-btn.on .d-ic{opacity:1}

/* FAB */
.fab{position:fixed;right:18px;bottom:82px;z-index:50;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold-warm),var(--gold-deep));border:none;cursor:pointer;color:#fff;font-size:26px;font-weight:300;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.3),0 0 0 1px var(--gold-line);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
body.L .fab{box-shadow:0 6px 20px rgba(138,101,36,.3),0 2px 8px rgba(184,122,133,.2),0 0 0 1px var(--gold-line)}
.fab:active{transform:scale(.92)}
.fab.on{transform:rotate(135deg)}
.fab-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:48;backdrop-filter:blur(6px);animation:fade .25s both}
body.L .fab-bg{background:rgba(60,45,20,.32)}
.fab-sheet{position:fixed;right:18px;bottom:146px;z-index:49;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab-item{display:flex;align-items:center;gap:10px;padding:11px 16px 11px 14px;background:var(--card);border:1px solid var(--line2);border-radius:28px;cursor:pointer;color:var(--tx);font-size:12.5px;font-weight:500;letter-spacing:.3px;box-shadow:0 4px 16px rgba(0,0,0,.22);transition:all .2s}
body.L .fab-item{box-shadow:0 4px 14px rgba(138,101,36,.15),0 2px 8px rgba(184,122,133,.1)}
.fab-item:active{transform:scale(.96)}
.fab-item .fi-ic{width:32px;height:32px;border-radius:50%;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--fa);font-size:15px;font-weight:500;flex-shrink:0}

/* ═══════════════ PAGE: BRIEF — Minimal Typography ═══════════════ */
.br-hero{padding:6px 0 22px;margin-bottom:6px}
.br-eyebrow{font-family:var(--fd);font-size:9px;letter-spacing:2.4px;text-transform:uppercase;color:var(--tx3);font-weight:500;margin-bottom:14px}
.br-main{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.br-big{font-family:var(--fd);font-size:64px;font-weight:200;color:var(--tx);font-variant-numeric:tabular-nums;line-height:.85;letter-spacing:-1.5px}
.br-big-u{font-size:16px;color:var(--tx3);opacity:.75;font-weight:300;letter-spacing:0}
.br-desc{font-size:11.5px;color:var(--tx2);line-height:1.5;flex:1;padding-top:8px;padding-left:4px;font-weight:400}
.br-desc b{color:var(--tx);font-weight:600;font-family:var(--fd)}
.br-prog{width:100%;height:1px;background:var(--line2);overflow:hidden;margin-bottom:10px}
.br-prog-f{height:100%;background:var(--tx);transition:width .5s}
.br-meta{display:flex;gap:18px;font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:1.6px;text-transform:uppercase;font-weight:500}
.br-meta span b{color:var(--tx);font-weight:600;font-size:11px;margin-right:4px;font-variant-numeric:tabular-nums}

.br-sec{margin-bottom:24px}
.br-sec-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.br-sec-ttl{font-family:var(--fd);font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--tx2);font-weight:500;display:flex;align-items:center;gap:8px}
.br-sec-ic{font-family:var(--fa);color:var(--gold);font-size:11px;width:14px;text-align:center;font-weight:500;opacity:.8}
.br-sec-ct{font-family:var(--fd);font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums;font-weight:500;letter-spacing:.4px}
.br-sec-ct.mat{color:var(--matcha-deep)}
.br-sec-ct.rose{color:var(--rose-deep)}

.br-list{display:flex;flex-direction:column}
.br-row{display:flex;align-items:center;gap:11px;padding:9px 2px;font-size:12px;color:var(--tx);cursor:pointer;transition:opacity .2s;border-bottom:1px solid var(--line)}
.br-row:last-child{border-bottom:none}
.br-row:active{opacity:.6}
.br-row.done{opacity:.42}
.br-row.done .br-row-tx{color:var(--tx2);text-decoration:line-through;text-decoration-color:var(--tx4);text-decoration-thickness:.5px}
.br-row-ck{width:11px;height:11px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700}
.br-row.done .br-row-ck{background:var(--matcha);color:#fff}
.br-row:not(.done) .br-row-ck{border:1.2px solid var(--line3)}
.br-row-seg{font-family:var(--fa);font-size:12px;color:var(--gold);width:14px;text-align:center;flex-shrink:0;opacity:.85}
.br-row-tx{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400;letter-spacing:.1px}
.br-row-tag{font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:.5px;flex-shrink:0;font-weight:500;text-transform:lowercase}
.br-row-tag.hot{color:var(--rose-deep);font-weight:600}

.br-tmr{padding:2px 0;margin-bottom:14px}
.br-tmr-row{display:flex;align-items:center;gap:12px;padding:8px 2px;border-bottom:1px solid var(--line)}
.br-tmr-row:last-child{border-bottom:none}
.br-tmr-ic{font-family:var(--fa);color:var(--gold);font-size:14px;width:16px;text-align:center;flex-shrink:0;opacity:.8}
.br-tmr-bd{flex:1;min-width:0}
.br-tmr-ar{font-family:var(--fa);font-size:13px;color:var(--gold);font-weight:500;line-height:1.2}
.br-tmr-th{font-size:11px;color:var(--tx);margin-top:2px;line-height:1.35;font-weight:400}
.br-tmr-time{font-family:var(--fd);font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.br-empty{padding:16px 2px;color:var(--tx3);font-size:11.5px;font-style:italic;text-align:left}

/* ═══════════════ PAGE: ACTIVITIES · Quiet Luxury ═══════════════ */
.act-card{display:flex;align-items:center;gap:13px;padding:14px 16px;margin-bottom:8px;background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-soft);transition:transform .2s,border-color .2s;position:relative;overflow:hidden}
.act-card:active{transform:scale(.995)}
.act-card::before{content:'';position:absolute;left:0;top:12%;bottom:12%;width:2.5px;border-radius:0 2px 2px 0;background:var(--ac-color,var(--gold));opacity:.7}
.ac-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:4px;box-shadow:0 0 0 2px var(--card),0 0 0 3px var(--line2)}
.ac-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.ac-n{font-size:13.5px;color:var(--tx);font-weight:500;letter-spacing:.2px;line-height:1.2}
.ac-t{font-family:var(--fd);font-size:10.5px;color:var(--tx3);letter-spacing:.6px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px;font-weight:400}
.ac-d{color:var(--matcha-deep);font-weight:600;letter-spacing:.3px}
.ac-actions{display:flex;gap:2px;flex-shrink:0}
.ac-mn{width:30px;height:30px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--tx3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:var(--fa)}
.ac-mn:hover{color:var(--tx);background:var(--tx5)}
.ac-mn:active{transform:scale(.85);color:var(--gold)}

.act-form{padding:14px;margin-top:8px;background:var(--card2);border:1px solid var(--line);border-radius:13px;display:flex;flex-direction:column;gap:9px}
.act-form input{padding:10px 13px;background:var(--card);border:1px solid var(--line2);border-radius:9px;color:var(--tx);font-size:12.5px;font-family:var(--f);outline:none;transition:border-color .2s}
.act-form input:focus{border-color:var(--gold)}
.col-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.col-chip{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.15)}
body.L .col-chip{border:1px solid rgba(0,0,0,.08)}
.col-chip.sel{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--gold);transform:scale(1.08)}
.act-btn{padding:8px 14px;background:var(--gold);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:var(--f);font-size:11.5px;font-weight:500;letter-spacing:.3px;transition:all .2s}
.act-btn.x{background:transparent;color:var(--tx2);border:1px solid var(--line2)}
.act-btn:active{transform:scale(.95)}
.add-trig{width:100%;padding:13px;background:transparent;border:1px dashed var(--line2);border-radius:12px;color:var(--tx2);cursor:pointer;font-family:var(--f);font-size:12px;letter-spacing:.3px;font-weight:500;transition:all .25s;margin-top:10px}
.add-trig:hover,.add-trig:active{border-color:var(--gold);color:var(--gold);background:var(--gold-ghost)}

/* ═══════════════ PAGE: SETTINGS ═══════════════ */
.settings-sec{margin-bottom:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:all .3s}
.settings-sec-hd{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;user-select:none;transition:background .2s}
.settings-sec-hd:active{background:var(--card2)}
.settings-sec.open .settings-sec-hd{border-bottom:1px solid var(--line)}
.settings-sec-ic{font-family:var(--fa);font-size:15px;color:var(--gold);width:22px;text-align:center}
.settings-sec-ttl{flex:1;display:flex;flex-direction:column;gap:1px}
.settings-sec-ar{font-family:var(--fa);font-size:13px;color:var(--gold);font-weight:600;line-height:1.1}
.settings-sec-th{font-size:10.5px;color:var(--tx);font-weight:500;letter-spacing:.2px}
.settings-sec-arrow{font-family:var(--fd);font-size:12px;color:var(--tx3);transition:transform .25s;line-height:1}
.settings-sec.open .settings-sec-arrow{transform:rotate(180deg);color:var(--gold)}
.settings-sec-body{padding:0 13px;display:block;max-height:0;overflow:hidden;opacity:0;transition:max-height .3s ease,opacity .25s ease,padding .3s ease}
.settings-sec.open .settings-sec-body{padding:11px 13px 13px;max-height:5000px;opacity:1}
.settings-sec.open .settings-sec-body .sub-seg{overflow:visible}

.th-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.th-opt{padding:10px 4px;background:var(--card2);border:1px solid var(--line);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .25s;color:var(--tx2);font-family:var(--f);font-size:10.5px;font-weight:500;letter-spacing:.3px}
.th-opt.on{background:var(--gold-soft);border-color:var(--gold-line);color:var(--gold)}
.th-opt .th-ic{font-size:17px;color:var(--gold)}

/* Hijri adjuster */
.hj-adj{padding:2px 0}
.hj-adj-disp{display:flex;align-items:baseline;gap:7px;padding:10px 12px;background:var(--card2);border:1px solid var(--line);border-radius:9px;margin-bottom:8px}
.hj-adj-disp .hj-calc-lbl{font-family:var(--fd);font-size:8.5px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.hj-adj-disp .hj-calc-val{flex:1;font-family:var(--fa);font-size:14px;color:var(--gold);font-weight:600;line-height:1.15}
.hj-adj-ctrl{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:8px}
.hj-adj-lbl{flex:1;font-size:11px;color:var(--tx);font-weight:500}
.hj-adj-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--line2);color:var(--gold);cursor:pointer;font-family:var(--fd);font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.hj-adj-btn:active{transform:scale(.9)}
.hj-adj-val{font-family:var(--fd);font-size:14px;color:var(--tx);font-weight:600;font-variant-numeric:tabular-nums;min-width:30px;text-align:center;letter-spacing:.3px}
.hj-adj-val.active{color:var(--rose-deep)}
.hj-adj-reset{width:100%;padding:8px;background:transparent;border:1px solid var(--line2);border-radius:8px;color:var(--tx2);cursor:pointer;font-family:var(--f);font-size:10.5px;font-weight:500;letter-spacing:.3px;transition:all .2s;margin-bottom:6px}
.hj-adj-reset:hover,.hj-adj-reset:active{border-color:var(--rose);color:var(--rose-deep);background:var(--rose-ghost)}
.hj-note{font-size:10.5px;color:var(--tx3);line-height:1.55;padding:7px 10px;background:var(--rose-ghost);border-left:2px solid var(--rose-line);border-radius:4px;font-style:italic}

/* Sub-activity editor in settings */
.sub-seg{margin-bottom:8px;padding:10px 12px;background:var(--card2);border:1px solid var(--line);border-radius:10px}
.sub-seg-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.sub-seg-sym{font-family:var(--fa);color:var(--gold);font-size:13px}
.sub-seg-n{flex:1;font-size:11.5px;color:var(--tx);font-weight:500;letter-spacing:.2px}
.sub-seg-ct{font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;font-weight:500}
.sub-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.sub-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 8px 4px 9px;background:var(--card);border:1px solid var(--line2);border-radius:16px;font-size:10.5px;color:var(--tx);cursor:pointer;transition:all .2s}
.sub-chip:active{transform:scale(.97)}
.sub-chip.editing{border-color:var(--gold);background:var(--gold-ghost)}
.sub-chip-ic{font-family:var(--fa);color:var(--gold);font-size:11px}
.sub-chip-x{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;margin-left:1px;padding:0;line-height:1;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.sub-chip-x:hover{color:var(--rd);background:rgba(196,102,104,.1)}
.sub-empty-s{color:var(--tx3);font-size:10px;font-style:italic;margin-bottom:7px}
.sub-add-row{display:flex;gap:5px;align-items:center;padding:7px 9px;background:var(--card);border:1px dashed var(--line2);border-radius:8px}
.sub-add-row input{padding:7px 9px;background:var(--card2);border:1px solid var(--line2);border-radius:6px;font-size:11px;color:var(--tx);font-family:var(--f);outline:none;transition:border-color .2s}
.sub-add-row input:focus{border-color:var(--gold)}
.sub-add-row input.ic-in{width:40px;text-align:center;font-family:var(--fa);font-size:13px}
.sub-add-row input.n-in{flex:1}
.sub-add-btn{padding:7px 11px;border-radius:7px;border:none;cursor:pointer;font-family:var(--f);font-size:11px;font-weight:500;letter-spacing:.3px;transition:all .2s}
.sub-add-btn.save{background:var(--gold);color:#fff}
.sub-add-btn.cancel{background:transparent;color:var(--tx2);border:1px solid var(--line2)}
.sub-add-btn:active{transform:scale(.95)}
.sub-add-trig{width:100%;padding:8px;background:transparent;border:1px dashed var(--line2);border-radius:7px;color:var(--tx2);cursor:pointer;font-family:var(--f);font-size:10.5px;letter-spacing:.3px;font-weight:500;transition:all .2s}
.sub-add-trig:hover,.sub-add-trig:active{border-color:var(--gold);color:var(--gold);background:var(--gold-ghost)}

.dt-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.dt-btn{padding:12px 4px 10px;background:var(--card2);border:1px solid var(--line);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--tx2);font-family:var(--f);font-size:10px;font-weight:500;letter-spacing:.4px;transition:all .25s}
.dt-btn:active{transform:scale(.96);color:var(--gold);border-color:var(--gold-line)}
.dt-btn .dt-ic{font-family:var(--fa);font-size:16px;color:var(--gold);font-weight:500}
.dt-info{padding:10px 12px;background:var(--card2);border-radius:9px;font-size:10.5px;color:var(--tx2);line-height:1.7;letter-spacing:.2px}
.dt-info b{color:var(--tx);font-family:var(--fd);font-weight:500}

/* ═══════════════ PAGE: STATS — Quiet Luxury · Premium Typography ═══════════════ */
.st-hero{display:flex;flex-direction:column;gap:4px;margin-bottom:20px;padding:6px 0 6px}
.st-hero-main{display:flex;align-items:baseline;gap:12px}
.st-hero-big{font-family:var(--fd);font-size:64px;font-weight:200;color:var(--tx);font-variant-numeric:tabular-nums;line-height:.85;letter-spacing:-1.5px}
.st-hero-u{font-size:18px;color:var(--tx3);font-weight:300;letter-spacing:0}
.st-hero-lbl{font-family:var(--fd);font-size:9px;letter-spacing:2.4px;text-transform:uppercase;color:var(--tx3);font-weight:500;margin-bottom:10px}
.st-hero-sub{margin-top:3px;font-size:11px;color:var(--tx2);line-height:1.4;letter-spacing:.2px}
.st-hero-sub b{color:var(--tx);font-weight:600;font-family:var(--fd)}
.st-hero-line{width:100%;height:1px;background:var(--line2);margin-top:16px}
.st-inline-row{display:flex;align-items:baseline;gap:18px;margin-top:12px;padding-bottom:2px;font-family:var(--fd);font-size:9.5px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.st-inline-row span b{color:var(--tx);font-weight:600;font-size:12px;margin-right:4px;font-variant-numeric:tabular-nums;letter-spacing:.2px}

/* Compact summary row — elegant 4-cell stats strip after calendar/week-list */
.st-summary{margin:14px 0 18px;padding:14px 4px 4px;border-top:1px solid var(--line)}
.st-sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.st-sum-cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;position:relative}
.st-sum-cell:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;bottom:20%;width:1px;background:var(--line)}
.st-sum-v{font-family:var(--fd);font-size:22px;font-weight:300;color:var(--tx);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.3px}
.st-sum-u{font-size:11px;color:var(--tx3);font-weight:300;margin-left:1px;letter-spacing:0}
.st-sum-l{font-family:var(--fd);font-size:8.5px;color:var(--tx3);letter-spacing:1.4px;text-transform:uppercase;font-weight:500;text-align:center;line-height:1.2}
.st-sum-sub{margin-top:14px;text-align:center;font-size:10.5px;color:var(--tx2);letter-spacing:.3px;font-weight:400}
.st-sum-sub b{color:var(--tx);font-family:var(--fd);font-weight:600;font-variant-numeric:tabular-nums}

.period-tog{display:flex;gap:2px;padding:0;margin-bottom:14px;border-bottom:1px solid var(--line)}
.period-btn{padding:9px 0;background:transparent;border:none;cursor:pointer;font-family:var(--fd);font-size:10px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;font-weight:500;transition:all .2s;flex:1;position:relative}
.period-btn.on{color:var(--tx)}
.period-btn.on::after{content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:1.5px;background:var(--tx)}

.seg-filter{display:flex;gap:5px;margin-bottom:18px;overflow-x:auto;padding:3px 0 6px;-ms-overflow-style:none;scrollbar-width:none}
.seg-filter::-webkit-scrollbar{display:none}
.sf-pill{flex-shrink:0;padding:5px 11px;background:transparent;border:1px solid var(--line2);border-radius:18px;cursor:pointer;font-family:var(--f);font-size:10.5px;color:var(--tx2);letter-spacing:.2px;transition:all .2s;display:flex;align-items:center;gap:5px;font-weight:400}
.sf-pill.on{background:var(--tx);border-color:var(--tx);color:var(--bg)}
.sf-pill.on .sf-sym{color:var(--bg);opacity:.85}
.sf-pill .sf-sym{font-family:var(--fa);font-size:11px;font-weight:500;color:var(--gold);opacity:.75}

/* Minimal collapsible section in stats — no card/borders */
.st-sec{margin-bottom:18px}
.st-sec-hd{display:flex;align-items:baseline;gap:10px;padding:9px 2px;cursor:pointer;user-select:none;transition:opacity .2s;border-bottom:1px solid var(--line)}
.st-sec-hd:active{opacity:.6}
.st-sec-ic{font-family:var(--fa);font-size:11px;color:var(--gold);width:14px;text-align:center;opacity:.8}
.st-sec-ttl{flex:1;font-family:var(--fd);font-size:10px;color:var(--tx);letter-spacing:2.4px;text-transform:uppercase;font-weight:500}
.st-sec-ct{font-family:var(--fd);font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums;letter-spacing:.4px;font-weight:500}
.st-sec-arr{font-family:var(--fd);font-size:10px;color:var(--tx3);transition:transform .25s;line-height:1}
.st-sec.open .st-sec-arr{transform:rotate(180deg);color:var(--tx)}
.st-sec-bd{padding:0;display:block;max-height:0;overflow:hidden;opacity:0;transition:max-height .3s ease,opacity .25s ease,padding .3s ease}
.st-sec.open .st-sec-bd{padding:10px 0 8px;max-height:4000px;opacity:1}

/* Calendar — premium spacing, subtle lines */
.cal-wrap{padding:4px 0 10px;background:transparent;border:none;margin-bottom:4px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0 4px 14px;margin-bottom:6px}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid var(--line2);color:var(--tx2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:var(--fd);font-weight:400;line-height:1}
.cal-nav-btn:active{transform:scale(.88);color:var(--tx);border-color:var(--line3)}
.cal-nav-btn[disabled]{opacity:.25;cursor:not-allowed;pointer-events:none}
.cal-title{font-family:var(--fd);font-size:14px;color:var(--tx);font-weight:400;letter-spacing:.6px;display:flex;flex-direction:column;align-items:center;gap:3px}
.cal-title .ct-hj{font-family:var(--fa);font-size:11px;color:var(--gold);font-weight:500;opacity:.88;letter-spacing:.3px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;padding:0 2px}
.cal-dow-lbl{text-align:center;font-family:var(--fd);font-size:8px;color:var(--tx3);letter-spacing:1.4px;text-transform:uppercase;font-weight:500;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 2px}
.cal-cell{aspect-ratio:1/1;border-radius:8px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;color:var(--tx);font-weight:400;transition:all .25s;font-variant-numeric:tabular-nums;border:1px solid transparent}
.cal-cell.out{color:var(--tx4);pointer-events:none;opacity:.3}
.cal-cell.today{border-color:var(--tx);box-shadow:0 0 0 1px var(--tx5)}
.cal-cell.today .cc-n{font-weight:600}
.cal-cell.sel{border-color:var(--tx);background:var(--tx5)}
.cal-cell .cc-n{position:relative;z-index:2}
.cal-cell::before{content:'';position:absolute;inset:2px;border-radius:6px;background:var(--pct-bg,transparent);opacity:var(--pct-op,0);transition:opacity .3s}
.cal-cell:active{transform:scale(.92)}
.cal-cell .cc-nt{position:absolute;bottom:2px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--bl);z-index:2;box-shadow:0 0 0 1px var(--bg)}
.cal-cell .cc-fast{position:absolute;top:2px;left:3px;font-family:var(--fa);font-size:7px;color:var(--gold);opacity:.8;line-height:1;z-index:2;font-weight:600;letter-spacing:-.5px}
.cal-cell .cc-fast.white{color:var(--pp)}

/* Calendar legend — quiet, underneath grid */
.cal-legend{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;padding:10px 2px 2px;font-family:var(--fd);font-size:8.5px;color:var(--tx3);letter-spacing:1.2px;text-transform:uppercase;font-weight:500}
.cal-legend .cl-scale{display:inline-flex;align-items:center;gap:4px}
.cal-legend .cl-lab{font-size:8px;letter-spacing:1.4px;color:var(--tx3)}
.cal-legend .cl-sw{width:8px;height:8px;border-radius:2px;display:inline-block}
.cal-legend .cl-sep{color:var(--tx4);font-size:8px}
.cal-legend .cl-item{display:inline-flex;align-items:center;gap:4px}
.cal-legend .cl-ic{font-family:var(--fa);font-size:9.5px;font-weight:600;letter-spacing:-.2px}

/* Day detail card */
.cal-detail{padding:14px;margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-soft)}
.cd-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line);gap:8px}
.cd-hd-main{flex:1;min-width:0}
.cd-day-nav{width:30px;height:30px;border-radius:50%;background:transparent;border:1px solid var(--line2);color:var(--tx2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-family:var(--fd);font-weight:400;line-height:1}
.cd-day-nav:not([disabled]):active{transform:scale(.88);color:var(--gold);border-color:var(--gold-line)}
.cd-day-nav[disabled]{opacity:.3;cursor:not-allowed}
.cd-date{font-family:var(--fd);font-size:14px;color:var(--tx);font-weight:500;letter-spacing:.3px}
.cd-date-hj{font-family:var(--fa);font-size:11px;color:var(--gold);margin-top:1px;letter-spacing:.2px}
.cd-mini-st{display:flex;gap:10px}
.cd-mini{text-align:right}
.cd-mini-v{font-family:var(--fd);font-size:15px;color:var(--tx);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.2px}
.cd-mini-l{font-size:8px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;font-weight:500}
.cd-note-lbl{font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:1.6px;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.cd-note{width:100%;min-height:62px;padding:10px 12px;background:var(--card2);border:1px solid var(--line2);border-radius:9px;color:var(--tx);font-family:var(--f);font-size:12px;outline:none;resize:vertical;line-height:1.55;transition:border-color .2s}
.cd-note:focus{border-color:var(--gold)}
.cd-note-foot{display:flex;gap:6px;margin-top:8px;align-items:center}
.cd-save-hint{flex:1;font-size:9px;color:var(--tx3);letter-spacing:.3px;font-style:italic}

/* Week view */
.wk-list{display:flex;flex-direction:column;margin-bottom:0}
.wk-row{display:flex;align-items:center;gap:14px;padding:13px 2px;cursor:pointer;transition:opacity .2s;border-bottom:1px solid var(--line)}
.wk-row:last-child{border-bottom:none}
.wk-row:active{opacity:.6}
.wk-row.today .wk-dn{color:var(--rose-deep);font-weight:600}
.wk-d{display:flex;flex-direction:column;align-items:center;min-width:32px;gap:1px}
.wk-dow{font-family:var(--fd);font-size:8.5px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.wk-dn{font-family:var(--fd);font-size:18px;color:var(--tx);font-weight:300;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.3px}
.wk-bar{flex:1;height:2px;background:var(--line2);overflow:hidden;position:relative;border-radius:1px}
.wk-bar-f{height:100%;transition:width .5s;border-radius:1px}
.wk-pct{font-family:var(--fd);font-size:12px;color:var(--tx);font-weight:400;font-variant-numeric:tabular-nums;min-width:36px;text-align:right;letter-spacing:.2px}
.wk-nt-ic{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--bl);font-size:10px;flex-shrink:0;opacity:.75}

/* Year view — elegant ring-per-month grid */
.yr-wrap{padding:4px 0 10px;margin-bottom:4px}
.yr-nav{display:flex;align-items:center;justify-content:space-between;padding:0 4px 20px}
.yr-title{font-family:var(--fd);font-size:22px;color:var(--tx);font-weight:200;letter-spacing:1.5px;font-variant-numeric:tabular-nums}
.yr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 10px;margin-bottom:6px;padding:0 2px}
.yr-m{position:relative;padding-top:100%;padding-bottom:18px;background:transparent;border:none;cursor:pointer;transition:transform .2s}
.yr-m:active{transform:scale(.92)}
.yr-m.cur::after{content:'';position:absolute;top:5%;left:14%;width:72%;height:72%;border-radius:50%;border:1px dashed var(--gold-line);pointer-events:none}
.yr-ring{position:absolute;top:0;left:0;right:0;width:100%;aspect-ratio:1/1;pointer-events:none}
.yr-m-inner{position:absolute;top:0;left:0;right:0;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;pointer-events:none;z-index:2}
.yr-m-v{font-family:var(--fd);font-size:15px;color:var(--tx);font-weight:300;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.3px}
.yr-m.zero .yr-m-v{color:var(--tx4)}
.yr-m-u{font-size:8px;color:var(--tx3);font-weight:300;margin-left:1px}
.yr-m-n{position:absolute;bottom:0;left:0;right:0;text-align:center;font-family:var(--fd);font-size:9.5px;color:var(--tx3);letter-spacing:1.4px;text-transform:uppercase;font-weight:500;line-height:1}
.yr-m.cur .yr-m-n{color:var(--gold);font-weight:600}

/* Year summary row */
.yr-summary{display:flex;justify-content:space-around;padding:16px 4px 4px;margin-top:24px;border-top:1px solid var(--line);gap:4px}
.yr-sum-cell{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative}
.yr-sum-cell:not(:last-child)::after{content:'';position:absolute;right:0;top:22%;bottom:22%;width:1px;background:var(--line)}
.yr-sum-v{font-family:var(--fd);font-size:20px;color:var(--tx);font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1}
.yr-sum-u{font-size:10px;color:var(--tx3);font-weight:300;margin-left:1px}
.yr-sum-l{font-family:var(--fd);font-size:8.5px;color:var(--tx3);letter-spacing:1.3px;text-transform:uppercase;font-weight:500;text-align:center}

/* Per-segment performance */
.sp-chart{display:flex;flex-direction:column;gap:2px}
.sp-row{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
.sp-row:last-child{border-bottom:none}
.sp-lbl{flex:0 0 100px;font-size:11px;color:var(--tx);display:flex;align-items:center;gap:5px;font-weight:400}
.sp-bar{flex:1;height:2px;background:var(--line2);overflow:hidden;border-radius:1px}
.sp-fill{height:100%;transition:width .5s;border-radius:1px}
.sp-pct{flex:0 0 48px;text-align:right;font-family:var(--fd);font-size:12px;color:var(--tx);font-weight:400;font-variant-numeric:tabular-nums;letter-spacing:.2px}

/* Item performance */
.ip-list{display:flex;flex-direction:column}
.ip-item{display:flex;align-items:center;gap:10px;padding:10px 2px;background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;font-size:11.5px;cursor:pointer;transition:opacity .2s}
.ip-item:last-child{border-bottom:none}
.ip-item:active{opacity:.6}
.ip-item.hi .ip-days b{color:var(--matcha-deep)}
.ip-item.low .ip-days b{color:var(--rose-deep)}
.ip-item.mid .ip-days b{color:var(--gold)}
.ip-item.on{background:var(--tx5)}
.ip-tx{flex:1;color:var(--tx);display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400}
.ip-seg{font-family:var(--fa);font-size:12px;color:var(--gold);width:13px;text-align:center;opacity:.8}
.ip-stat{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ip-days{font-family:var(--fd);font-size:10px;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.3px;font-weight:500}
.ip-days b{color:var(--tx);font-weight:600}

.ip-hist{padding:11px 13px 13px;margin:4px 0 8px;background:var(--card);border:1px solid var(--gold-line);border-radius:11px;box-shadow:var(--shadow-soft)}
.ip-hist-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.ip-hist-lb{font-family:var(--fd);font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.ip-hist-v{font-family:var(--fd);font-size:13px;color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums}
.ip-hist-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:2px;margin-bottom:7px}
.ip-hist-cell{aspect-ratio:1/1;border-radius:2px;background:var(--line);min-width:8px;position:relative}
.ip-hist-cell.hit{background:var(--matcha);opacity:.85}
.ip-hist-cell.today{box-shadow:0 0 0 1px var(--gold)}
.ip-hist-foot{display:flex;align-items:center;justify-content:space-between;font-family:var(--fd);font-size:8.5px;color:var(--tx3);letter-spacing:1.2px;text-transform:uppercase}

/* Add sheet form (used inline on pages, not popup) */
.add-sheet{background:var(--card);border:1px solid var(--gold-line);border-radius:14px;padding:14px 14px 12px;margin-bottom:14px;box-shadow:var(--shadow-soft)}
.add-sheet h3{font-family:var(--fa);font-size:16px;color:var(--gold);font-weight:600;letter-spacing:.3px;margin-bottom:3px;text-align:center}
.add-sheet .add-sub{text-align:center;font-size:10px;color:var(--tx3);letter-spacing:.5px;margin-bottom:12px}
.add-sheet-form{padding:0;display:flex;flex-direction:column;gap:8px}
.add-sheet-form input,.add-sheet-form select,.add-sheet-form textarea{padding:10px 13px;background:var(--card2);border:1px solid var(--line2);border-radius:9px;color:var(--tx);font-size:13px;font-family:var(--f);outline:none;transition:border-color .2s}

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function toM(t){var p=(t||"0:0").split(":");return parseInt(p[0])*60+parseInt(p[1]||0)}
function fH(m){m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,"0")+":"+String(Math.round(m%60)).padStart(2,"0")}
function fDur(m){if(m<=0)m+=1440;if(m>1440)m-=1440;var h=Math.floor(m/60),mi=Math.round(m%60);return mi?h+"h "+mi+"m":h+"h"}
function fDurTh(m){if(m<=0)m+=1440;if(m>1440)m-=1440;var h=Math.floor(m/60),mi=Math.round(m%60);if(h===0)return mi+" นาที";if(mi===0)return h+" ชม.";return h+" ชม. "+mi+" น."}
function calcNi(){if(!D.pt)return{half:0,third:0,len:0};var mg=toM(D.pt.Maghrib),fj=toM(D.pt.Fajr),len=fj>mg?fj-mg:(1440-mg)+fj;return{half:(mg+Math.round(len/2))%1440,third:(mg+Math.round(len*2/3))%1440,len:len}}
function segM(seg){
  if(!D.pt)return{before_fajr:[0,300],fajr:[300,390],karahah:[390,405],duha:[405,705],dhuhr:[705,870],asr:[870,1050],maghrib:[1050,1170],isha:[1170,1430]}[seg.id]||[0,1440];
  var f=toM(D.pt.Fajr),sr=toM(D.pt.Sunrise),d=toM(D.pt.Dhuhr),a=toM(D.pt.Asr),m=toM(D.pt.Maghrib),i=toM(D.pt.Isha),ni=calcNi();
  return{before_fajr:[ni.half,f],fajr:[f,sr],duha:[sr+15,d-15],dhuhr:[d-15,a],asr:[a,m],maghrib:[m,i],isha:[i,ni.half]}[seg.id]||[0,1440];
}
function karahahM(){
  if(!D.pt)return null;
  var sr=toM(D.pt.Sunrise);
  return[sr,sr+15];
}
function segDur(s){var r=segM(s),d=r[1]-r[0];if(d<=0)d+=1440;return d}
function curSeg(){var nm=new Date().getHours()*60+new Date().getMinutes();for(var i=0;i<SEG.length;i++){var r=segM(SEG[i]);if(r[0]<=r[1]){if(nm>=r[0]&&nm<r[1])return SEG[i]}else{if(nm>=r[0]||nm<r[1])return SEG[i]}}return SEG[6]}
function curActs(){var nm=new Date().getHours()*60+new Date().getMinutes();return D.activities.filter(function(a){var s=toM(a.s),e=toM(a.e);if(e<=s)return nm>=s||nm<e;return nm>=s&&nm<e})}
function isDay(){if(!D.pt)return false;var nm=new Date().getHours()*60+new Date().getMinutes();return nm>=toM(D.pt.Sunrise)&&nm<toM(D.pt.Maghrib)}
function isPast(seg){var r=segM(seg),nm=new Date().getHours()*60+new Date().getMinutes();if(r[0]<=r[1])return nm>=r[1];return false}

function dateKey(d){
  d=d||new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function dateKeyOffset(offset){var d=new Date();d.setDate(d.getDate()+offset);return dateKey(d)}
function dateKeyOf(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")}

// Hijri day (with user offset applied)
function hijriDayFor(dk){
  if(!D.hj)return null;
  var parts=dk.split("-");
  var target=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  target.setHours(12,0,0,0);
  var today=new Date();today.setHours(12,0,0,0);
  var diffDays=Math.round((target-today)/(1000*60*60*24));
  var hd=parseInt(D.hj.day)+diffDays+(D.hjOffset||0);
  while(hd>30)hd-=30;
  while(hd<1)hd+=30;
  return hd;
}
// Today's effective Hijri day including offset
function hijriToday(){
  if(!D.hj)return null;
  var hd=parseInt(D.hj.day)+(D.hjOffset||0);
  while(hd>30)hd-=30;
  while(hd<1)hd+=30;
  return hd;
}

function fastingSunnahMark(dk){
  var parts=dk.split("-");
  var dt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var wd=dt.getDay();
  var hd=hijriDayFor(dk);
  if(hd===13||hd===14||hd===15)return{label:"◯",cls:"white",title:"วันสีขาว "+hd+" · ซุนนะฮ์ถือศีลอด"};
  if(wd===1)return{label:"☪",cls:"",title:"วันจันทร์ · ซุนนะฮ์ถือศีลอด"};
  if(wd===4)return{label:"☪",cls:"",title:"วันพฤหัสบดี · ซุนนะฮ์ถือศีลอด"};
  return null;
}
function isDone(type,seg,idx){return !!D.todayDone[dateKey()+"_"+type+"_"+seg+"_"+idx]}
function tglDone(type,seg,idx){
  var k=dateKey()+"_"+type+"_"+seg+"_"+idx;
  D.todayDone[k]=!D.todayDone[k];
  if(!D.dayTotals[dateKey()])D.dayTotals[dateKey()]=computeTotals();
  sv();render();
}
function computeTotals(){
  var s=0,d=0;
  SEG.forEach(function(sg){s+=(D.suns[sg.id]||[]).length;d+=(D.duas[sg.id]||[]).length});
  return{sun:s,dua:d,total:s+d};
}

// ═════════════════ ANALYTICS ═════════════════
function dayStats(dk){
  var sd=0,dd=0;
  Object.keys(D.todayDone).forEach(function(k){
    if(!D.todayDone[k])return;
    if(k.indexOf(dk+"_")!==0)return;
    if(k.indexOf("_sun_")>0)sd++;
    else if(k.indexOf("_dua_")>0)dd++;
  });
  var tot=D.dayTotals[dk]||computeTotals();
  var done=sd+dd;
  var possible=tot.total||0;
  return{done:done,possible:possible,sun:sd,dua:dd,sunTotal:tot.sun||0,duaTotal:tot.dua||0,pct:possible?done/possible:0};
}
function segDayStats(segId,dk){
  var sd=0,dd=0,sTot=(D.suns[segId]||[]).length,dTot=(D.duas[segId]||[]).length;
  (D.suns[segId]||[]).forEach(function(_,i){if(D.todayDone[dk+"_sun_"+segId+"_"+i])sd++});
  (D.duas[segId]||[]).forEach(function(_,i){if(D.todayDone[dk+"_dua_"+segId+"_"+i])dd++});
  var tot=sTot+dTot;
  return{done:sd+dd,possible:tot,pct:tot?(sd+dd)/tot:0};
}
function segStatsToday(segId){return segDayStats(segId,dateKey())}

function streaks(threshold){
  threshold=threshold||0.5;
  var cur=0,best=0,run=0;
  for(var i=0;i<400;i++){
    var dk=dateKeyOffset(-i);
    var st=dayStats(dk);
    if(st.possible===0){if(i===0)continue;break}
    if(st.pct>=threshold){run++;if(run>best)best=run}
    else{run=0;if(i>60)break}
  }
  cur=0;
  for(var j=0;j<400;j++){
    var dkj=dateKeyOffset(-j);
    var stj=dayStats(dkj);
    if(stj.possible===0&&j===0)continue;
    if(stj.pct>=threshold)cur++; else break;
  }
  return{cur:cur,best:Math.max(best,cur)};
}

function segPerf(segId,days){
  days=days||30;
  var tot=0,done=0;
  var sunList=D.suns[segId]||[],duaList=D.duas[segId]||[];
  var st=sunList.length+duaList.length;
  if(!st)return 0;
  for(var i=0;i<days;i++){
    var dk=dateKeyOffset(-i);tot+=st;
    sunList.forEach(function(_,i2){if(D.todayDone[dk+"_sun_"+segId+"_"+i2])done++});
    duaList.forEach(function(_,i2){if(D.todayDone[dk+"_dua_"+segId+"_"+i2])done++});
  }
  return tot?done/tot:0;
}
function itemPerf(type,segId,idx,days){
  days=days||30;var hit=0,cap=0;
  for(var i=0;i<days;i++){var dk=dateKeyOffset(-i);cap++;if(D.todayDone[dk+"_"+type+"_"+segId+"_"+idx])hit++}
  return{hit:hit,cap:cap,pct:cap?hit/cap:0};
}

function periodStats(dkList,filterSeg){
  var done=0,possible=0,days=0,dayPcts=[];
  dkList.forEach(function(dk){
    if(filterSeg){
      var ss=segDayStats(filterSeg,dk);
      done+=ss.done;possible+=ss.possible;
      if(ss.possible>0){days++;dayPcts.push(ss.pct)}
    } else {
      var ds=dayStats(dk);
      done+=ds.done;possible+=ds.possible;
      if(ds.possible>0){days++;dayPcts.push(ds.pct)}
    }
  });
  return{done:done,possible:possible,days:days,pct:possible?done/possible:0,dayPcts:dayPcts};
}

// ═════════════════ COUNTDOWN ═════════════════
function nextPrayer(){
  if(!D.pt)return null;
  var nm=new Date().getHours()*60+new Date().getMinutes();
  var order=["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
  for(var i=0;i<order.length;i++){
    var k=order[i],m=toM(D.pt[k]);
    if(nm<m){var pn=PN.find(function(p){return p.k===k});return{key:k,ar:pn.ar,th:pn.th,at:D.pt[k],mins:m-nm}}
  }
  var fm=toM(D.pt.Fajr),mins=(1440-nm)+fm,pn2=PN[0];
  return{key:"Fajr",ar:pn2.ar,th:pn2.th,at:D.pt.Fajr,mins:mins,next:true};
}

// ═════════════════ GEOMETRY ═════════════════
function pXY(cx,cy,r,deg){var rd=(deg-90)*Math.PI/180;return[cx+r*Math.cos(rd),cy+r*Math.sin(rd)]}
function secP(cx,cy,r,d1,d2){var s=pXY(cx,cy,r,d1),e=pXY(cx,cy,r,d2);return"M"+cx+","+cy+"L"+s[0]+","+s[1]+"A"+r+","+r+",0,"+(d2-d1>180?1:0)+",1,"+e[0]+","+e[1]+"Z"}
function ringP(cx,cy,ri,ro,d1,d2){var a=pXY(cx,cy,ro,d1),b=pXY(cx,cy,ro,d2),c=pXY(cx,cy,ri,d2),dd=pXY(cx,cy,ri,d1);var lg=d2-d1>180?1:0;return"M"+a[0]+","+a[1]+"A"+ro+","+ro+",0,"+lg+",1,"+b[0]+","+b[1]+"L"+c[0]+","+c[1]+"A"+ri+","+ri+",0,"+lg+",0,"+dd[0]+","+dd[1]+"Z"}
function mD(m){return(m/1440)*360}
function midA(s,e){if(s<=e)return mD((s+e)/2);var t=1440-s+e;return mD((s+t/2)%1440)}
function drawS(cx,cy,r,sM,eM,attr){var o="";if(sM<=eM)o+='<path d="'+secP(cx,cy,r,mD(sM),mD(eM))+'" '+attr+"/>";else{o+='<path d="'+secP(cx,cy,r,mD(sM),360)+'" '+attr+"/>";o+='<path d="'+secP(cx,cy,r,0,mD(eM))+'" '+attr+"/>"}return o}
function drawR(cx,cy,ri,ro,sM,eM,attr){var o="";if(sM<=eM)o+='<path d="'+ringP(cx,cy,ri,ro,mD(sM),mD(eM))+'" '+attr+"/>";else{o+='<path d="'+ringP(cx,cy,ri,ro,mD(sM),360)+'" '+attr+"/>";o+='<path d="'+ringP(cx,cy,ri,ro,0,mD(eM))+'" '+attr+"/>"}return o}

// ═════════════════ RENDER ═════════════════
var _renderTimer=null;
function render(){
  if(_renderTimer)return;
  _renderTimer=requestAnimationFrame(function(){
    _renderTimer=null;
    var mainY=window.scrollY;
    try{_render()}catch(e){document.getElementById("app").innerHTML='<div style="padding:20px;color:#c85050">Error: '+esc(e.message)+'</div>';console.error(e)}
    window.scrollTo(0,mainY);
  });
}

function _render(){

      var dotP=pXY(cx,cy,Rc-4,md);

    }

  if(kh){
    var khC=isL()?"rgba(180,60,60,.10)":"rgba(200,90,90,.12)";

  }
  // dividers
  boundaries.forEach(function(bm){
    var ba=mD(bm),p1=pXY(cx,cy,2.5,ba),p2=pXY(cx,cy,Rc,ba);

  });
  // sunrise
  if(D.pt&&D.pt.Sunrise){
    var srM=toM(D.pt.Sunrise),sa=mD(srM);

    o+='<circle cx="'+srP[0]+'" cy="'+srP[1]+'" r="2.2" fill="'+srC+'" opacity=".9"/>';

      var rA=rayDeg*Math.PI/180;
      var r1=[srP[0]+Math.cos(rA)*2.8,srP[1]+Math.sin(rA)*2.8];
      var r2=[srP[0]+Math.cos(rA)*4,srP[1]+Math.sin(rA)*4];
      o+='<line x1="'+r1[0]+'" y1="'+r1[1]+'" x2="'+r2[0]+'" y2="'+r2[1]+'" stroke="'+srC+'" stroke-width=".45" opacity=".7"/>';
    });
    var srL=pXY(cx,cy,Rc+22,sa);
    o+='<text x="'+srL[0]+'" y="'+srL[1]+'" text-anchor="middle" dominant-baseline="central" fill="'+srC+'" font-size="3.3" font-family="var(--fd)" font-weight="600" letter-spacing=".5">'+D.pt.Sunrise+'</text>';

  // night markers — ½ night + ⅓ last (with actual time values on clock)
  var ni=calcNi();
  var npC=isL()?"rgba(110,80,130,.6)":"rgba(168,140,196,.45)";
  var npT=isL()?"rgba(110,80,130,.85)":"rgba(168,140,196,.75)";
  if(ni.half){
    var aH=mD(ni.half);
    var hIn=pXY(cx,cy,Rc-1,aH),hOut=pXY(cx,cy,Ro+3,aH);
    var hFrac=pXY(cx,cy,Ro+7.5,aH),hTime=pXY(cx,cy,Ro+13.5,aH);
    o+='<line x1="'+hIn[0]+'" y1="'+hIn[1]+'" x2="'+hOut[0]+'" y2="'+hOut[1]+'" stroke="'+npC+'" stroke-width=".5" stroke-dasharray="2,1.5"/>';
    o+='<text x="'+hFrac[0]+'" y="'+hFrac[1]+'" text-anchor="middle" dominant-baseline="central" fill="'+npC+'" font-size="3.3" font-family="var(--fd)" font-weight="500">½</text>';
    o+='<text x="'+hTime[0]+'" y="'+hTime[1]+'" text-anchor="middle" dominant-baseline="central" fill="'+npT+'" font-size="3" font-family="var(--fd)" font-weight="600" letter-spacing=".3">'+fH(ni.half)+'</text>';
  }
  if(ni.third){
    var aT=mD(ni.third);
    var tIn=pXY(cx,cy,Rc-1,aT),tOut=pXY(cx,cy,Ro+3,aT);
    var tFrac=pXY(cx,cy,Ro+7.5,aT),tTime=pXY(cx,cy,Ro+13.5,aT);
    o+='<line x1="'+tIn[0]+'" y1="'+tIn[1]+'" x2="'+tOut[0]+'" y2="'+tOut[1]+'" stroke="'+npC+'" stroke-width=".5" stroke-dasharray="2,1.5"/>';
    o+='<text x="'+tFrac[0]+'" y="'+tFrac[1]+'" text-anchor="middle" dominant-baseline="central" fill="'+npC+'" font-size="3.3" font-family="var(--fd)" font-weight="500">⅓</text>';
    o+='<text x="'+tTime[0]+'" y="'+tTime[1]+'" text-anchor="middle" dominant-baseline="central" fill="'+npT+'" font-size="3" font-family="var(--fd)" font-weight="600" letter-spacing=".3">'+fH(ni.third)+'</text>';
  }
  // hour ticks
  for(var h=0;h<24;h++){
    var ha=mD(h*60),hp1=pXY(cx,cy,Rc-.3,ha),hp2=pXY(cx,cy,Rc+2,ha);
    o+='<line x1="'+hp1[0]+'" y1="'+hp1[1]+'" x2="'+hp2[0]+'" y2="'+hp2[1]+'" stroke="'+(h%6===0?"var(--gold-line)":"var(--tx4)")+'" stroke-width="'+(h%6===0?".5":".25")+'"/>';
    if(h%3===0){var ht=pXY(cx,cy,Rc+7,ha);o+='<text x="'+ht[0]+'" y="'+ht[1]+'" text-anchor="middle" dominant-baseline="central" fill="var(--tx3)" font-size="5.2" font-family="var(--fd)" font-weight="500">'+(h<10?"0"+h:h)+'</text>'}
  }
  // hand
  var ca=mD(ch),tip=pXY(cx,cy,Rc*.84,ca),b1=pXY(cx,cy,2.5,ca-90),b2=pXY(cx,cy,2.5,ca+90);
  var handC=isL()?"rgba(168,58,52,.8)":"rgba(200,70,70,.75)";
  o+='<polygon points="'+tip[0]+","+tip[1]+" "+b1[0]+","+b1[1]+" "+b2[0]+","+b2[1]+'" fill="'+handC+'" style="filter:drop-shadow(0 0 3px '+handC+'60)"/>';

  o+='</svg>';
  o+='<div class="clock-cap">today<span class="c-pct">'+todayPct+'%</span></div>';
  o+='</div>';
  return o;
}

function sortedSunIdx(segId){
  var list=D.suns[segId]||[];
  var undone=[],done=[];
  list.forEach(function(it,idx){if(isDone("sun",segId,idx))done.push(idx);else undone.push(idx)});
  return undone.concat(done);
}

function getFocusHint(vs){
  var ss=segStatsToday(vs.id);
  if(ss.possible===0)return null;
  var pct=Math.round(ss.pct*100);
  if(ss.pct>=1)return{tx:"ครบช่วง"+vs.th+" · MashaAllah",pct:pct};
  var remaining=ss.possible-ss.done;
  if(ss.pct===0)return{tx:"เหลือ "+remaining+" รายการในช่วงนี้",pct:0};
  return{tx:"เหลือ "+remaining+" รายการ",pct:pct};
}

  var dk=dateKey();

  var msg=getBriefMsg(ds.pct);

  o+='<div class="br-desc">'+msg+'</div>';

    o+='<div class="br-empty">— ยังไม่มีรายการที่ทำวันนี้ —<br>เริ่มต้นช่วง'+curSeg().th+'ได้เลย</div>';
  } else {
    o+='<div class="br-list">';

      o+='<div class="br-row done" onclick="jumpToSeg(\''+x.segId+'\')">';
      o+='<span class="br-row-ck">✓</span>';
      o+='<span class="br-row-seg">'+x.sg.sym+'</span>';

      o+='<span class="br-row-tag">'+esc(x.sg.th)+'</span>';
      o+='</div>';
    });
    o+='</div>';
  }
  o+='</div>';

  // Remaining
  var remaining=collectRemainingItems(dk);
  o+='<div class="br-sec">';
  o+='<div class="br-sec-hd"><div class="br-sec-ttl"><span class="br-sec-ic">○</span>เหลือต้องทำ</div><div class="br-sec-ct rose">'+remaining.length+' รายการ</div></div>';

    o+='<div class="br-empty">✓ ครบถ้วนแล้ววันนี้ · MashaAllah</div>';
  } else {
    o+='<div class="br-list">';

      var tagCls=x.urgent?"hot":"";

function collectDoneItems(dk){

function collectRemainingItems(dk){
  var arr=[],cs=curSeg();
  var csIdx=SEG.findIndex(function(s){return s.id===cs.id});
  var order=[];
  for(var i=0;i<SEG.length;i++)order.push(SEG[(csIdx+i)%SEG.length]);

    });
    (D.duas[sg.id]||[]).forEach(function(it,i){
      if(!D.todayDone[dk+"_dua_"+sg.id+"_"+i])arr.push({segId:sg.id,sg:sg,type:"dua",idx:i,label:"ดุอาอ์ประจำช่วง",urgent:ord===0});
    });
  });
  return arr;
}
function getTomorrowPreview(){
  var d=new Date();d.setDate(d.getDate()+1);
  var wd=d.getDay();
  var dowName=DOW_FULL[wd];
  var specials=[];
  if(wd===5)specials.push({ic:"❖",ar:"يَوْمُ الجُمُعَة",th:"วันศุกร์ · อ่านอัลกะฮ์ฟิ + ดุอาอ์บ่าย"});
  if(wd===1||wd===4){var dn=wd===1?"จันทร์":"พฤหัส";specials.push({ic:"☪",ar:"صَوْمُ الاثْنَيْنِ وَالخَمِيس",th:"ซุนนะฮ์ถือศีลอดวัน"+dn})}

}
